<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Shop</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="shortcut icon" href="https://images.deliveryhero.io/image/fd-bd/LH/apkj-listing.jpg?width=480&height=360&quality=45" type="image/x-icon">
</head>
<body>
    <header>
            <h1> Pets</h1>
    </header>
    <nav>
        <ul>
            <li><a href="index .html">Home</a></li>
            <li><a href="index .html">About Us</a></li>
            <li><a href="index .html">Breeds</a></li>
            
        </ul>
    </nav>
    <Main>
        <section>
            <h2>WELCOME TO OUR SHOP !!</h2>
            <form action="index.php">

                 <fieldset class="info">
                <legend>Basic info</legend>
                <label class="Basic"for="name">Your Name </label>
                <input class="Basic" type="text" id="name">

                <label class="Basic" for="email">Your email</label>
                <input class="Basic" type="email" id="email">
                 </fieldset>

                <fieldset class="breed">
                    <legend>CAT INFO</legend>
                    <input type="radio" name="cat" id="Ragdol">
                    <label for="Ragdol">Ragdoll</label><br>

                    <input type="radio" name="cat" id="Maine Coon">
                    <label for="Maine Coon">Maine Coon</label><br>

                    <input type="radio" name="cat" id="Persian">
                    <label for="Persian">Persian</label><br>

                    <input type="radio" name="cat" id="Burmilla">
                    <label for="Burmilla">Burmilla</label><br>
                </fieldset>

                <fieldset class="color">
                    <legend>COLOR</legend>
                    <input type="checkbox" name="color" id="gray">
                    <label for="gray">Gray</label><br>

                    <input type="checkbox" name="color" id="black">
                    <label for="black">Black</label><br>

                    <input type="checkbox" name="color" id="white">
                    <label for="white">White</label><br>
    
                    <input type="checkbox" name="color" id="orange">
                    <label for="orange">Orange</label><br>

                </fieldset>
                <fieldset class="comments">
                    <legend>comments</legend>
                    <textarea cols="50" rows="4">

                    </textarea>
                </fieldset>
                <div class="button">
                <input type="submit" id="submit" value="submit">
                <input type="reset" id="reset" value="clear">
                </div>

            </form>

        </section>
    </Main>

    
</body>
</html>
