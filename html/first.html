<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic css</title>
    <style>p{
            color: hsl(0, 49%, 66%);
            }
            li{
                background-color: rgb(0, 255, 255); /* Embedded or Internal CSS*/
            }

    </style>
</head>
<body>
    <h3 style="color: brown;">Learning basic CSS</h3> <!--Inline css-->
    <p>CSS means = Cascading Style sheet</p>
    <ul>
        <li>Inline</li>
        <li>Internal or Embedded</li>
        <li>External</li>
    </ul>
</body>
</html>
