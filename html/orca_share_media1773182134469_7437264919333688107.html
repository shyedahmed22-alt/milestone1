                  {label:'Continuous',icon:'∞',val:continuousMode,fn:()=>{const n=!continuousMode;setContinuousMode(n);persist({continuousMode:n});}},
                ].map(({label,icon,val,fn})=>h('button',{key:label,onClick:fn,style:{display:'flex',alignItems:'center',gap:6,padding:'7px 9px',borderRadius:8,border:`1px solid ${val?T.ac+'55':T.di}`,background:val?`${T.ac}10`:T.bg,cursor:'pointer',transition:'all .15s',fontSize:10,color:val?T.ac:T.mu}},
                  h('span',null,icon),' ',label,
                  h('div',{style:{marginLeft:'auto',width:26,height:14,borderRadius:7,background:val?T.ac:T.di,position:'relative',flexShrink:0,transition:'background .2s'}},
                    h('div',{style:{position:'absolute',top:2,left:val?14:2,width:10,height:10,borderRadius:'50%',background:'#fff',transition:'left .2s'}})
                  )
                ))
              ),
              h('div',{style:{display:'flex',gap:6}},
                h('button',{onClick:()=>{setShowCustomizer(true);setShowSettings(false);},style:{flex:1,padding:'7px',background:`${T.ac}15`,border:`1px solid ${T.ac}44`,borderRadius:8,color:T.ac,fontSize:10,cursor:'pointer',fontWeight:700}},'🎛 Layout'),
                h('button',{onClick:()=>{if(window.confirm('Reset all data and progress?')){localStorage.removeItem(SK);window.location.reload();}},style:{padding:'7px 12px',background:T.bg,border:`1px solid ${T.di}`,borderRadius:8,color:T.mu,fontSize:10,cursor:'pointer'}},'⟳ Reset')
              )
            )
          )
        )
      ),

      h('div',{style:{padding:'6px 0 4px'}}),

      // ── Layout Studio overlay ──
      layoutEdit&&h('div',{style:{position:'fixed',inset:0,zIndex:960,background:T.bg+'f5',overflow:'auto',cursor:'default'}},
        h('div',{style:{
          position:'sticky',top:0,zIndex:970,
          background:`${T.bg}ee`,backdropFilter:'blur(10px)',
          borderBottom:`1px solid ${T.ac}33`,
          padding:'10px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,
        }},
          h('div',null,
            h('div',{style:{fontSize:14,fontWeight:700,color:T.ac,display:'flex',alignItems:'center',gap:7}},
              h('span',null,'✥'),h('span',null,'Layout Studio')
            ),
            h('div',{style:{fontSize:10,color:T.mu,marginTop:2}},'Drag title bars to move  ·  Drag ⤡ to resize  ·  Click ● to show/hide')
          ),
          h('div',{style:{display:'flex',gap:8}},
            h('button',{onClick:()=>wpDispatch({t:'reset'}),style:{padding:'7px 14px',background:'transparent',border:`1px solid ${T.di}`,borderRadius:8,color:T.mu,fontSize:11,cursor:'pointer'}},'⟳ Reset'),
            h('button',{onClick:()=>setLayoutEdit(false),style:{padding:'7px 20px',background:T.ac,border:'none',borderRadius:8,color:T.bg,fontSize:12,fontWeight:700,cursor:'pointer'}},'✓ Save & Close')
          )
        ),
        h('div',{style:{position:'relative',minHeight:1500,minWidth:1060,padding:'10px'}},
          h(DW,{id:'xpbar',wp,dis:wpDispatch,edit:true,T,label:'XP Bar',icon:'⭐',defH:40},h(XpBar,{ai,T})),
          h(DW,{id:'metabar',wp,dis:wpDispatch,edit:true,T,label:'Meta Bar',icon:'◆',defH:44},
            h('div',{style:{display:'flex',gap:5,flexWrap:'wrap',alignItems:'center',padding:'4px 0'}},
              h('span',{style:{padding:'4px 10px',borderRadius:20,border:`1px solid ${tc.col}44`,background:`${tc.col}10`,fontSize:11,color:tc.col}},`◆ ${tc.label}`),
              h('span',{style:{padding:'4px 10px',borderRadius:20,background:`${G.col}10`,fontSize:11,color:G.col}},`${G.icon} ${G.desc}`)
            )
          ),
          h(DW,{id:'stats',wp,dis:wpDispatch,edit:true,T,label:'Live Stats',icon:'📊',defH:92},
            h('div',{style:{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:8,padding:'4px 0'}},
              h(Stat,{label:'Net WPM',value:liveWpm,color:T.ac}),
              h(Stat,{label:'Raw WPM',value:liveRaw,color:T.mu}),
              h(Stat,{label:'Accuracy',value:`${ai.acc}%`,color:ai.acc>=92?T.ok:T.ac}),
              h(Stat,{label:'Score',value:(score||0).toLocaleString(),color:T.tx}),
              h(Stat,{label:'Streak',value:streak,color:streak>=5?T.ok:T.mu}),
              h(Stat,{label:'Level',value:`${lv.level}`,color:'#ffd700'})
            )
          ),
          h(DW,{id:'panels',wp,dis:wpDispatch,edit:true,T,label:'Insight Panels',icon:'📋',defH:270},
            h('div',{style:{padding:'4px 0'}},
              h('div',{style:{display:'flex',gap:2,borderBottom:`1px solid ${T.di}`,marginBottom:8}},
                [['insight','⚡'],['heatmap','⌨'],['achievements','🏆'],['history','📊']].map(([p,ic])=>h('span',{key:p,style:{padding:'4px 10px',fontSize:10,color:T.mu}},ic+' '+p))
              ),
              h('div',{style:{padding:'10px 14px',background:`${T.ac}0e`,border:`1px solid ${T.ac}25`,borderRadius:10}},
                h('div',{style:{fontSize:9,color:T.ac,textTransform:'uppercase',letterSpacing:'.15em',marginBottom:4}},'⚡ Insight'),
                h('div',{style:{fontSize:12,color:T.tx,lineHeight:1.6}},ai.insight(game))
              )
            )
          ),
          h(DW,{id:'weakstrip',wp,dis:wpDispatch,edit:true,T,label:'Weak Keys',icon:'⚠',defH:40},
            h('div',{style:{display:'flex',gap:5,flexWrap:'wrap',padding:'4px 0'}},
              wk.slice(0,6).map(({c,rate})=>h('div',{key:c,style:{padding:'3px 8px',background:`rgba(248,113,113,.15)`,border:`1px solid rgba(248,113,113,.3)`,borderRadius:6,fontSize:12,fontFamily:T.mo,color:T.er,fontWeight:700}},safeUp(c)))
            )
          ),
          h(DW,{id:'progress',wp,dis:wpDispatch,edit:true,T,label:'Progress Bar',icon:'▬',defH:18},
            h('div',{style:{height:3,background:T.di,borderRadius:2,overflow:'hidden',marginTop:8}},
              h('div',{style:{height:'100%',background:`linear-gradient(90deg,${T.ac},${T.ok})`,width:`${prog}%`,borderRadius:2}})
            )
          ),
          h(DW,{id:'wordbox',wp,dis:wpDispatch,edit:true,T,label:'Word Box',icon:'🔤',defH:220},
            h('div',{style:{padding:'4px 0'}},
              h(WordBox,{words,wIdx,typed,cIdx,cStates,done,errFlash,streak,game,T,renderMode,precisionLevel,wordDamage,killedAt,killedWords})
            )
          ),
          h(DW,{id:'hintbar',wp,dis:wpDispatch,edit:true,T,label:'Hint Bar',icon:'💬',defH:52},
            h('div',{style:{display:'flex',alignItems:'center',gap:8,padding:'8px 14px',background:T.sur,border:`1px solid ${T.di}`,borderRadius:8,marginTop:4}},
              h('span',{style:{fontSize:9,color:T.mu,textTransform:'uppercase',minWidth:28}},'Now'),
              h('span',{style:{fontFamily:T.mo,fontSize:16,color:T.ac,flex:1}},typed||'type · space to submit')
            )
          ),
          h(DW,{id:'footer',wp,dis:wpDispatch,edit:true,T,label:'Footer',icon:'▄',defH:36},
            h('footer',{style:{textAlign:'center',padding:6,borderTop:`1px solid ${T.di}`,fontSize:9,color:T.mu,letterSpacing:'.15em',textTransform:'uppercase'}},
              'Texterf · 20 Render Modes · 10 Themes · 10 FX · 9 Games')
          )
        )
      ),

      // ── Normal game widgets — ordered by Layout Studio y-position ──
      ...(()=>{
        const widgetOrder=['xpbar','metabar','stats','progress','wordbox','hintbar','footer'];
        const widgetMap={
          xpbar: h(DW,{key:'xpbar',id:'xpbar',wp,dis:wpDispatch,edit:false,T,label:'XP Bar',icon:'⭐'},h(XpBar,{ai,T})),
          metabar: h(DW,{key:'metabar',id:'metabar',wp,dis:wpDispatch,edit:false,T,label:'Meta Bar',icon:'◆'},
            h('div',{className:'meta-bar',style:{marginBottom:8,marginTop:6,display:'flex',gap:5,flexWrap:'wrap',alignItems:'center'}},
              h('span',{style:{padding:'4px 10px',borderRadius:20,border:`1px solid ${tc.col}44`,background:`${tc.col}10`,fontSize:11,color:tc.col}},`◆ ${tc.label}`),
              h('span',{style:{padding:'4px 10px',borderRadius:20,border:`1px solid ${G.col}44`,background:`${G.col}10`,fontSize:11,color:G.col}},`${G.icon} ${G.desc}`),
              precisionLevel>0&&h('span',{style:{padding:'4px 10px',borderRadius:20,border:`1px solid ${PREC_LEVELS[precisionLevel]?.col||T.ok}88`,background:`${PREC_LEVELS[precisionLevel]?.col||T.ok}18`,fontSize:11,color:PREC_LEVELS[precisionLevel]?.col||T.ok,fontWeight:700,animation:'pulse 2s ease infinite'}},`${PREC_LEVELS[precisionLevel]?.icon} ${PREC_LEVELS[precisionLevel]?.label} Precision`),
              lr!==null&&h('span',{style:{padding:'4px 10px',borderRadius:20,border:`1px solid ${lr>0?T.ok:T.er}33`,background:`${lr>0?T.ok:T.er}0d`,fontSize:11,color:lr>0?T.ok:T.er,fontWeight:600}},(lr>0?'▲':'▼')+` LR`),
              game==='time'&&started&&!over&&h('span',{style:{padding:'4px 10px',borderRadius:20,border:`1px solid ${timeLeft<10?T.er:T.ac}66`,background:`${timeLeft<10?T.er:T.ac}10`,fontSize:12,color:timeLeft<10?T.er:T.ac,fontWeight:700,fontFamily:T.mo}},`⏱ ${timeLeft}s`),
              h('span',{style:{marginLeft:'auto',padding:'4px 10px',borderRadius:20,border:`1px solid ${T.di}`,fontSize:11,color:T.mu}},`✍️ ${(tw||0).toLocaleString()} · 🏆 ${ai.ach.size}/${ACHS.length}`)
            )
          ),
          stats: h(DW,{id:'stats',wp,dis:wpDispatch,edit:false,T,label:'Stats Row',icon:'📊'},
            h('div',{className:'stats-row',style:{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:isArcadeUI?'clamp(8px,1.2vw,16px)':'clamp(6px,0.9vw,12px)',marginBottom:10,
              ...(isArcadeUI?{background:`${T.ac}08`,border:`1px solid ${T.ac}22`,borderRadius:12,padding:'10px 12px'}:{}),
              ...(isTerminalUI?{fontFamily:"'JetBrains Mono',monospace",fontSize:10}:{}),
            }},
              h(Stat,{label:'Net WPM',value:liveWpm,sub:hist.length>=2?`prev ${hist[hist.length-2]&&hist[hist.length-2].wpm||0}`:'',color:T.ac}),
              h(Stat,{label:'Raw WPM',value:liveRaw,sub:'all keys',color:T.mu}),
              h(Stat,{label:'Accuracy',value:`${ai.acc}%`,sub:hist.length?`best ${Math.max(...hist.map(r=>r.acc||0),0)}%`:'',color:ai.acc>=92?T.ok:ai.acc>=78?T.ac:T.er}),
              h(Stat,{label:'Score',value:(score||0).toLocaleString(),sub:`+${Math.round(liveWpm*(ai.acc/100)*10)}`,color:T.tx}),
              h(Stat,{label:'Streak',value:streak,sub:`best ${ai.maxStr||0}`,color:streak>=5?T.ok:T.mu}),
              h(Stat,{label:'Level',value:`${lv.level}`,sub:`${lv.progress}/${lv.needed} XP`,color:'#ffd700'})
            )
          ),
          panels: null,
          weakstrip: null,
          progress: h(DW,{key:'progress',id:'progress',wp,dis:wpDispatch,edit:false,T,label:'Progress',icon:'▬'},
            h('div',{style:{height:3,background:T.di,borderRadius:2,marginBottom:10,overflow:'hidden'}},
              h('div',{style:{height:'100%',background:`linear-gradient(90deg,${T.ac},${T.ok})`,borderRadius:2,width:`${prog}%`,transition:'width .25s ease'}})
            )
          ),
        };
        // Add wordbox + hintbar + footer into widgetMap so they all participate in y-sort
        widgetMap.wordbox=h(DW,{key:'wordbox',id:'wordbox',wp,dis:wpDispatch,edit:false,T,label:'Word Box',icon:'🔤'},
          !pool
            ?h('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',gap:12,padding:40}},h('div',{className:'pulse',style:{fontSize:28}},'⟳'),h('div',{style:{fontSize:13,color:T.mu}},'Loading…'))
            :h('div',{ref:boxRef,tabIndex:0,className:'typing-area-wrap',style:{flex:1,outline:'none'},onClick:()=>boxRef.current&&boxRef.current.focus()},
              h('div',{className:'game-info-row',style:{marginBottom:5,fontSize:10,color:T.mu,display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}},
                h('span',{style:{padding:'2px 6px',borderRadius:4,border:`1px solid ${T.di}`,fontSize:9,color:T.ac,fontFamily:T.mo}},game.toUpperCase()),
                h('span',{style:{flex:1}},
                  precisionLevel===3?'⬟ Iron — wrong key resets word · no backspace':
                  precisionLevel===2?'◆ Hard — char-by-char · wrong key blocked · no backspace':
                  precisionLevel===1?'◈ Soft — wrong key blocked · backspace OK':
                  game==='custom'?'Your text · Backspace OK · Space to submit':
                  game==='words'?'Type words · Backspace OK · Space to submit':
                  game==='time'?'60 seconds · max words':
                  game==='drill'?'20 smart-targeted words':
                  game==='race'?'First to finish wins':
                  game==='quote'?'Famous quote · live fetched':
                  game==='zen'?'No backspace · flow state':
                  game==='letters'?'Single letters & clusters · pure reflex':'Number training'
                ),
                h('span',{style:{fontFamily:T.mo,fontSize:10,color:T.di}},game==='time'?`${done.filter(w=>w.ok).length} words`:`${wIdx+1}/${words.length}`)
              ),
              h(WordBox,{words,wIdx,typed,cIdx,cStates,done,errFlash,streak,game,T,renderMode,precisionLevel,wordDamage,killedAt,killedWords,showHP}),
              fingerGuide&&h(FingerPanel,{nextChar,T}),
              showKeyboard&&h(KeyboardPanel,{nextChar,spaceReady,ai,T}),
            )
        );
        
        // Sort by y-position saved in Layout Studio — this is the actual fix for custom layout
        const sorted=[...widgetOrder].sort((a,b)=>(wp[a]?.y??999)-(wp[b]?.y??999));
        // Minimal mode: only render the wordbox — all other widgets skipped to remove spacing bugs
        if(isMinimalUI) return [widgetMap.wordbox];
        return sorted.filter(id=>widgetMap[id]!=null).map(id=>widgetMap[id]);
      })(),

      game==='race'&&!over&&started&&botSnap&&h(RaceTrack,{uPct:wIdx/(words.length||1),uWpm:liveWpm,uW:wIdx,total:words.length,bot:botSnap,T}),
      h('div',{className:'focus-esc'},'hover top-right for controls · ESC to exit'),
      focusMode&&h('div',{className:'focus-hud',style:{position:'fixed',top:14,right:16,zIndex:820,opacity:0,transition:'opacity .25s',display:'flex',gap:4,padding:'6px 10px',background:T.bg+'ee',border:`1px solid ${T.di}`,borderRadius:12,backdropFilter:'blur(16px)',boxShadow:'0 4px 24px rgba(0,0,0,.5)'},
        onMouseEnter:e=>e.currentTarget.style.opacity='1',
        onMouseLeave:e=>e.currentTarget.style.opacity='0'},
        h('button',{onClick:()=>setShowLayouts(true),title:'UI Layout',style:{padding:'4px 8px',borderRadius:6,border:`1px solid ${T.di}`,background:'transparent',color:T.mu,fontSize:10,fontWeight:700}},UI_LAYOUTS.find(u=>u.id===uiLayout)?.icon||'◫'),
        h('button',{onClick:()=>setShowThemes(true),title:'Theme',style:{padding:'4px 8px',borderRadius:6,border:`1px solid ${T.di}`,background:'transparent',color:T.ac,fontSize:12}},THEMES[themeKey]?.icon||'◐'),
        h('button',{onClick:()=>setShowModes(true),title:'Render mode',style:{padding:'4px 8px',borderRadius:6,border:`1px solid ${T.di}`,background:'transparent',color:T.ac,fontSize:11,fontWeight:700}},RENDER_MODES.find(r=>r.id===renderMode)?.icon||'≡'),
        h('button',{onClick:()=>setShowSettings(s=>!s),title:'Settings',style:{padding:'4px 8px',borderRadius:6,border:`1px solid ${T.di}`,background:'transparent',color:T.mu,fontSize:11}},'⚙'),
        h('div',{style:{width:1,background:T.di,alignSelf:'stretch',margin:'0 2px'}}),
        h('button',{onClick:()=>setFocusMode(false),title:'Exit focus mode (Esc)',style:{padding:'4px 10px',borderRadius:6,border:`1px solid ${T.er}44`,background:`${T.er}18`,color:T.er,fontSize:9,fontWeight:700,letterSpacing:'.06em'}},'✕ EXIT')
      ),
      
      isMinimalUI&&started&&h('div',{style:{position:'fixed',bottom:18,left:'50%',transform:'translateX(-50%)',display:'flex',gap:16,fontSize:11,fontFamily:T.mo,color:T.mu,opacity:.45,pointerEvents:'none',zIndex:10}},
        h('span',null,liveWpm,' wpm'),
        h('span',null,`${ai.acc}%`),
        game==='time'&&!over&&h('span',{style:{color:timeLeft<10?T.er:T.mu}},`${timeLeft}s`)
      ),
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script></body></html>
