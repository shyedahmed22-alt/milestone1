<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Texterf</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Rajdhani:wght@300;400;600;700&family=Cinzel:wght@400;700&family=Special+Elite&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0d0f14}
body{font-family:'Rajdhani',sans-serif;color:#e2ddd6}
#root{min-height:100vh}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes fadein{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes burstIn{from{opacity:0;transform:scale(1.5) translateY(-24px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes ghostAppear{from{opacity:0;filter:blur(8px)}to{opacity:1;filter:blur(0)}}
@keyframes zenFloat{0%{transform:translateY(4px)}50%{transform:translateY(-4px)}100%{transform:translateY(4px)}}
@keyframes rainFall{from{transform:translateY(-120px);opacity:0}40%{opacity:0.4}to{transform:translateY(200%);opacity:0}}
@keyframes slashLine{0%{width:0;opacity:1}70%{width:110%;opacity:1}100%{width:110%;opacity:0}}
@keyframes particleBurst{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--px),var(--py)) scale(0);opacity:0}}
@keyframes inkBlob{0%{transform:scale(0) rotate(0deg);opacity:0.9}50%{transform:scale(1.3) rotate(20deg);opacity:0.7}100%{transform:scale(2) rotate(40deg);opacity:0}}
@keyframes lightningFlash{0%{opacity:0}15%{opacity:1}30%{opacity:0}45%{opacity:0.8}100%{opacity:0}}
@keyframes fireLick{0%{transform:scaleY(0);opacity:1}50%{transform:scaleY(1.5);opacity:0.8}100%{transform:scaleY(2.2);opacity:0}}
@keyframes neonPulseRing{0%{transform:scale(0.4);opacity:1}100%{transform:scale(2.2);opacity:0}}
@keyframes glitchShift{0%{clip-path:inset(0);transform:none}25%{clip-path:inset(30% 0 50% 0);transform:translateX(-10px)}50%{clip-path:inset(60% 0 5% 0);transform:translateX(10px)}75%{clip-path:inset(10% 0 70% 0);transform:translateX(-5px)}100%{clip-path:inset(0);transform:none}}
@keyframes crystalFly{0%{transform:translate(0,0) rotate(0) scale(1);opacity:1}100%{transform:translate(var(--px),var(--py)) rotate(var(--pr)) scale(0);opacity:0}}
@keyframes confettiBurst{0%{transform:translate(0,0) rotate(0) scale(1);opacity:1}100%{transform:translate(var(--px),var(--py)) rotate(var(--pr)) scale(0.2);opacity:0}}
@keyframes sealIn{0%{opacity:0;transform:scale(3.5) rotate(-30deg)}50%{opacity:1;transform:scale(1.08) rotate(3deg)}75%{transform:scale(0.96) rotate(-1deg)}100%{transform:scale(1) rotate(0)}}
@keyframes levelUpBounce{0%{opacity:0;transform:translate(-50%,-50%) scale(0.3)}30%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}60%{transform:translate(-50%,-50%) scale(0.92)}80%{transform:translate(-50%,-50%) scale(1.05)}100%{opacity:0;transform:translate(-50%,-50%) scale(1) translateY(-60px)}}
@keyframes achSlide{from{transform:translateX(120px);opacity:0}12%{transform:translateX(-4px);opacity:1}85%{transform:translateX(0);opacity:1}to{transform:translateX(140px);opacity:0}}
@keyframes keyGlow{0%,100%{box-shadow:0 0 6px var(--fg-col)}50%{box-shadow:0 0 16px var(--fg-col),0 0 28px var(--fg-col)}}
@keyframes scanLine{from{top:-2px}to{top:100%}}
.cur{display:inline-block;width:2px;height:1.1em;vertical-align:text-bottom;border-radius:1px;animation:blink 1s step-end infinite}
.fadein{animation:fadein .3s ease}
.pulse{animation:pulse 1.4s ease infinite}
.scan-line{position:fixed;left:0;width:100%;height:2px;pointer-events:none;z-index:998;animation:scanLine 10s linear infinite;opacity:0.05}

@keyframes lineShift{from{transform:translateY(36px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes wordReveal{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes inkFill{from{opacity:.15}to{opacity:1}}
@keyframes screenShake{0%,100%{transform:none}20%{transform:translate(-3px,1px)}40%{transform:translate(3px,-1px)}60%{transform:translate(-2px,2px)}80%{transform:translate(2px,-2px)}}
@keyframes flashIn{0%{opacity:0;transform:translate(-50%,-50%) scale(.7)}40%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}70%{transform:translate(-50%,-50%) scale(.97)}100%{transform:translate(-50%,-50%) scale(1)}}
body.focus-mode header,body.focus-mode footer,body.focus-mode .meta-bar,body.focus-mode .stats-row,body.focus-mode .xp-bar,body.focus-mode .weak-strip,body.focus-mode .panel-tabs,body.focus-mode .panels,body.focus-mode .game-info-row,body.focus-mode .focus-panel-hide{display:none!important}
/* typing area becomes fullscreen bare canvas */
body.focus-mode .typing-area-wrap{position:fixed!important;inset:0!important;z-index:800!important;display:flex!important;flex-direction:column!important;align-items:center!important;justify-content:center!important;padding:60px 10vw!important;background:var(--bg)!important}
/* strip all borders/backgrounds from word box in focus mode */
body.focus-mode .word-box-outer,body.focus-mode .typing-area-wrap>div{background:transparent!important;border:none!important;box-shadow:none!important;}
/* tiny ESC hint */
body.focus-mode .focus-esc{display:flex!important;position:fixed;bottom:18px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--mu);letter-spacing:.2em;opacity:.4;z-index:801;pointer-events:none}
.focus-esc{display:none}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#444;border-radius:2px}
button{cursor:pointer;font-family:inherit}
#fx-layer{position:fixed;inset:0;pointer-events:none;z-index:999;overflow:hidden}
@keyframes wordHit{0%{transform:translateX(-6px) skewX(-3deg) scale(1.06)}15%{transform:translateX(6px) skewX(3deg) scale(.95)}40%{transform:translateX(-4px) skewX(-1.5deg) scale(1.03)}65%{transform:translateX(3px) skewX(1deg)}85%{transform:translateX(-1px)}100%{transform:none}}
@keyframes wordKill{0%{opacity:1;transform:scale(1) translateY(0);filter:brightness(1)}8%{opacity:1;transform:scale(1.18) translateY(-4px);filter:brightness(8) saturate(0) blur(0px)}20%{opacity:1;transform:scale(1.08) translateY(-8px) rotate(var(--kr,4deg));filter:brightness(4) saturate(3)}50%{opacity:.6;transform:scale(.78) translateY(-28px) rotate(var(--kr,4deg));filter:brightness(.4) blur(2px) saturate(0)}100%{opacity:0;transform:scale(.2) translateY(-60px) rotate(calc(var(--kr,4deg)*2.5));filter:blur(8px)}}
@keyframes wordCrit{0%{filter:drop-shadow(0 0 8px #ff2222) brightness(1.3);transform:scale(1)}33%{filter:drop-shadow(0 0 16px #ff0000) drop-shadow(0 0 6px #ff8800) brightness(1.8) saturate(2);transform:scale(1.04) skewX(-1deg)}66%{filter:drop-shadow(0 0 6px #ff4444) brightness(1.2) saturate(1.5);transform:scale(.98) skewX(1deg)}100%{filter:drop-shadow(0 0 8px #ff2222) brightness(1.3);transform:scale(1)}}
@keyframes dmgLetterCrack{0%{color:inherit}25%{color:#ff3333;text-shadow:0 0 8px #ff0000;transform:translateX(-2px) scale(1.1)}60%{color:#ff6666;transform:translateX(1px)}100%{color:inherit;text-shadow:none;transform:none}}
@keyframes hpDrain{from{width:var(--hp-w)}to{width:0}}
@keyframes dmgTick{0%{transform:translateY(0) scale(1);opacity:1}30%{transform:translateY(-10px) scale(1.15);opacity:1}100%{transform:translateY(-36px) scale(0.7);opacity:0}}
@keyframes dmgHitSpark{0%{transform:translate(-50%,-50%) scale(1.2);opacity:1}100%{transform:translate(calc(-50% + var(--px)),calc(-50% + var(--py))) scale(0);opacity:0}}
@keyframes wordShatter{0%{opacity:1;clip-path:inset(0);transform:none}25%{filter:brightness(6) saturate(0)}60%{opacity:.4;clip-path:inset(10% 0 40% 0);transform:translateY(-10px) rotate(var(--kr,3deg))}100%{opacity:0;clip-path:inset(50% 0 50% 0);transform:translateY(-30px)}}
/* ── New FX Keyframes ── */
@keyframes shockExpand{0%{transform:translate(-50%,-50%) scale(0);opacity:1}100%{transform:translate(-50%,-50%) scale(1);opacity:0}}
@keyframes vortexSpin{0%{transform:translate(var(--px),var(--py)) rotate(0deg) scale(1);opacity:1}100%{transform:translate(0px,0px) rotate(720deg) scale(0);opacity:0}}
@keyframes novaCore{0%{transform:translate(-50%,-50%) scale(0.1);opacity:1;filter:brightness(8)}40%{opacity:1;filter:brightness(4)}100%{transform:translate(-50%,-50%) scale(2.5);opacity:0;filter:brightness(1)}}
@keyframes bladeOut{0%{transform:translate(-50%,-50%) rotate(var(--br)) scale(1);opacity:1}100%{transform:translate(calc(-50% + var(--px)),calc(-50% + var(--py))) rotate(calc(var(--br) + 540deg)) scale(0.1);opacity:0}}
@keyframes portalOpen{0%{transform:translate(-50%,-50%) scale(0) rotateY(0deg);opacity:0}30%{opacity:1;transform:translate(-50%,-50%) scale(1.2) rotateY(20deg)}60%{transform:translate(-50%,-50%) scale(1) rotateY(0deg)}100%{transform:translate(-50%,-50%) scale(0) rotateY(90deg);opacity:0}}
@keyframes acidDrip{0%{transform:translateY(0) scaleX(1);opacity:1}60%{opacity:.7}100%{transform:translateY(var(--dy)) scaleX(.4) skewX(var(--sk));opacity:0}}
@keyframes bloodArc{0%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(calc(-50% + var(--px)),calc(-50% + var(--py))) scale(0.2);opacity:0}}
@keyframes chainPulse{0%{opacity:1;filter:brightness(3)}50%{opacity:.6;filter:brightness(1)}100%{opacity:0}}
@keyframes timeFreeze{0%{filter:saturate(0) brightness(4);transform:scale(1.05)}50%{filter:saturate(.1) brightness(2);transform:scale(1.02)}100%{filter:saturate(1) brightness(1);transform:scale(1)}}
@keyframes gravPull{0%{transform:translate(var(--gx),var(--gy)) scale(1);opacity:1}100%{transform:translate(0,0) scale(0);opacity:0}}
/* ── Arena render mode ── */
@keyframes enemyApproach{from{transform:translate(var(--ex),var(--ey)) scale(.6);opacity:0}to{transform:translate(0,0) scale(1);opacity:1}}
@keyframes enemyDie{0%{filter:brightness(5) saturate(0);transform:scale(1.3)}40%{filter:brightness(2) saturate(2) hue-rotate(20deg);transform:scale(.8) rotate(var(--kr,5deg))}100%{filter:brightness(0) blur(8px);transform:scale(.1) rotate(calc(var(--kr,5deg)*4)) translateY(-40px);opacity:0}}
@keyframes arenaWarn{0%,100%{opacity:0}50%{opacity:.9}}
@keyframes dangerPulse{0%,100%{box-shadow:0 0 8px var(--ec,#f00)}50%{box-shadow:0 0 24px var(--ec,#f00),0 0 48px var(--ec,#f00)44}}
/* ── Death Animations ── */
@keyframes deathExplosion{0%{transform:translate(-50%,-50%) scale(0);opacity:1}60%{opacity:1}100%{transform:translate(-50%,-50%) scale(3.5);opacity:0}}
/* LAYOUT VARIANTS (STRUCTURE ONLY) */
/* ── FOCUS: Pure distraction-free typing ── */
[data-uilayout='focus'] header{opacity:0!important;pointer-events:none;transition:opacity .35s;}
[data-uilayout='focus'] header:hover{opacity:1!important;pointer-events:auto;}
[data-uilayout='focus'] .meta-bar,[data-uilayout='focus'] .stats-row,[data-uilayout='focus'] .panels,[data-uilayout='focus'] .panel-tabs,[data-uilayout='focus'] .weak-strip,[data-uilayout='focus'] .game-info-row,[data-uilayout='focus'] .xp-bar-wrap{display:none!important;}
[data-uilayout='focus'] .word-box-outer{border:none!important;background:transparent!important;box-shadow:none!important;padding:48px 14vw!important;min-height:220px!important;}
[data-uilayout='focus'] .typing-area-wrap{min-height:88vh;display:flex!important;flex-direction:column!important;justify-content:center!important;}
[data-uilayout='focus'] .keyboard-panel{opacity:0.18;transition:opacity .3s;margin-top:28px!important;}
[data-uilayout='focus'] .keyboard-panel:hover{opacity:1;}
[data-uilayout='focus'] .finger-panel{opacity:0.18;transition:opacity .3s;}
[data-uilayout='focus'] .finger-panel:hover{opacity:1;}
[data-uilayout='focus'] footer{display:none!important;}

/* ── TERMINAL: Full monospace, code-editor feel ── */
[data-uilayout='terminal'] *{font-family:'JetBrains Mono',monospace!important;}
[data-uilayout='terminal'] .panels,[data-uilayout='terminal'] .panel-tabs,[data-uilayout='terminal'] .weak-strip,[data-uilayout='terminal'] .meta-bar,[data-uilayout='terminal'] .xp-bar-wrap{display:none!important;}
[data-uilayout='terminal'] .word-box-outer{border-radius:2px!important;border-color:var(--ac)!important;border-width:1px!important;background:rgba(0,0,0,.55)!important;padding:20px 18px!important;box-shadow:0 0 0 1px var(--ac)22,inset 0 0 40px rgba(0,0,0,.3)!important;}
[data-uilayout='terminal'] .stats-row{font-family:'JetBrains Mono',monospace!important;border:1px solid var(--ac)33!important;border-radius:2px!important;padding:6px!important;background:rgba(0,0,0,.4)!important;}
[data-uilayout='terminal'] .stats-row>div{border-radius:2px!important;border-color:var(--ac)44!important;background:transparent!important;}
[data-uilayout='terminal'] header{font-family:'JetBrains Mono',monospace!important;border-bottom:1px solid var(--ac)55!important;}
[data-uilayout='terminal'] .keyboard-panel{border-radius:2px!important;border-color:var(--ac)66!important;background:rgba(0,0,0,.6)!important;}
[data-uilayout='terminal'] .finger-panel{border-radius:2px!important;border-color:var(--ac)44!important;background:rgba(0,0,0,.5)!important;}
[data-uilayout='terminal'] .game-info-row{font-family:'JetBrains Mono',monospace!important;}

/* ── ARCADE: Bold neon, gamified ── */
[data-uilayout='arcade'] .panels,[data-uilayout='arcade'] .panel-tabs,[data-uilayout='arcade'] .meta-bar,[data-uilayout='arcade'] .weak-strip{display:none!important;}
[data-uilayout='arcade'] .word-box-outer{border-width:2px!important;border-radius:18px!important;box-shadow:0 0 32px var(--ac)33,inset 0 0 20px var(--ac)08!important;padding:28px 22px!important;}
[data-uilayout='arcade'] .stats-row{gap:clamp(8px,1.2vw,16px)!important;background:var(--ac)08!important;border:1px solid var(--ac)22!important;border-radius:14px!important;padding:10px 14px!important;}
[data-uilayout='arcade'] .stats-row>div{border-radius:12px!important;border-color:var(--ac)44!important;background:var(--ac)06!important;box-shadow:0 0 8px var(--ac)18!important;}
[data-uilayout='arcade'] .stats-row>div>div:nth-child(2){font-size:clamp(18px,1.8vw,26px)!important;}
[data-uilayout='arcade'] header{text-transform:uppercase!important;letter-spacing:.1em!important;border-bottom:2px solid var(--ac)44!important;}
[data-uilayout='arcade'] .keyboard-panel{border-radius:16px!important;border-color:var(--ac)55!important;box-shadow:0 0 20px var(--ac)22!important;}
[data-uilayout='arcade'] .finger-panel{border-radius:16px!important;border-color:var(--ac)44!important;box-shadow:0 0 14px var(--ac)18!important;}
[data-uilayout='arcade'] .xp-bar-wrap{display:none!important;}

/* ── PAPER: Serif, quiet, manuscript feel ── */
[data-uilayout='paper'] *{font-family:Georgia,'Special Elite',serif!important;}
[data-uilayout='paper'] .panels,[data-uilayout='paper'] .panel-tabs,[data-uilayout='paper'] .weak-strip,[data-uilayout='paper']  .xp-bar-wrap{display:none!important;}
[data-uilayout='paper'] body{background:#f2ede4!important;}
[data-uilayout='paper'] .word-box-outer{font-family:Georgia,serif!important;border-radius:2px!important;border:1px solid #c8b898!important;background:#faf7f2!important;box-shadow:2px 3px 12px rgba(0,0,0,.1),inset 0 1px 0 rgba(255,255,255,.8)!important;padding:32px 36px!important;min-height:160px!important;}
[data-uilayout='paper'] .stats-row>div{border-color:#c8b898!important;background:#faf7f2!important;border-radius:2px!important;font-family:Georgia,serif!important;}
[data-uilayout='paper'] header{border-bottom:1px solid #c8b898!important;font-family:Georgia,serif!important;}
[data-uilayout='paper'] .keyboard-panel{border-color:#c8b898!important;background:#faf7f2!important;border-radius:2px!important;}
[data-uilayout='paper'] .finger-panel{border-color:#c8b898!important;background:#faf7f2!important;border-radius:2px!important;}
[data-uilayout='paper'] .meta-bar span{font-family:Georgia,serif!important;border-color:#c8b898!important;background:#faf7f2!important;}

/* ── FRAMED: Decorative inset frame ── */
[data-uilayout='framed'] .panels,[data-uilayout='framed'] .panel-tabs,[data-uilayout='framed'] .weak-strip,[data-uilayout='framed'] .meta-bar,[data-uilayout='framed'] .xp-bar-wrap{display:none!important;}
[data-uilayout='framed'] .word-box-outer{border-width:2px!important;border-radius:0!important;outline:1px solid var(--di)!important;outline-offset:6px!important;box-shadow:0 0 0 14px var(--bg),0 0 0 16px var(--di)!important;margin:20px 4px!important;padding:32px 28px!important;}
[data-uilayout='framed'] .stats-row{border:2px solid var(--di)!important;border-radius:0!important;padding:8px!important;}
[data-uilayout='framed'] .stats-row>div{border-width:1px!important;border-radius:0!important;}
[data-uilayout='framed'] header{border-bottom:3px double var(--di)!important;}
[data-uilayout='framed'] .keyboard-panel{border-width:2px!important;border-radius:0!important;outline:1px solid var(--di)!important;outline-offset:3px!important;}
[data-uilayout='framed'] .finger-panel{border-width:2px!important;border-radius:0!important;}

/* ── NOTEBOOK: Handwritten/lined paper ── */
[data-uilayout='notebook'] *{font-family:'Special Elite',serif!important;}
[data-uilayout='notebook'] .panels,[data-uilayout='notebook'] .panel-tabs,[data-uilayout='notebook'] .weak-strip,[data-uilayout='notebook'] .xp-bar-wrap{display:none!important;}
[data-uilayout='notebook'] .word-box-outer{background:repeating-linear-gradient(transparent,transparent 27px,#7090cc18 28px)!important;border:none!important;border-left:3px solid #e0706022!important;border-radius:0!important;padding:20px 32px!important;min-height:180px!important;box-shadow:none!important;}
[data-uilayout='notebook'] .stats-row>div{border-style:dashed!important;border-radius:0!important;background:transparent!important;}
[data-uilayout='notebook'] .stats-row{border-bottom:2px dashed var(--di)!important;border-radius:0!important;padding-bottom:10px!important;}
[data-uilayout='notebook'] header{border-bottom:2px dashed var(--di)!important;}
[data-uilayout='notebook'] .keyboard-panel{border-style:dashed!important;border-radius:4px!important;background:transparent!important;}
[data-uilayout='notebook'] .finger-panel{border-style:dashed!important;border-radius:4px!important;background:transparent!important;}
[data-uilayout='notebook'] .meta-bar span{border-style:dashed!important;background:transparent!important;}

[data-uilayout='zen'] header,[data-uilayout='zen'] .meta-bar{opacity:.08;transition:opacity .4s;}
[data-uilayout='zen'] header:hover,[data-uilayout='zen'] .meta-bar:hover{opacity:.7;}
[data-uilayout='zen'] .stats-row,[data-uilayout='zen'] .panels,[data-uilayout='zen'] .weak-strip,[data-uilayout='zen'] .hint-bar{display:none!important;}
[data-uilayout='zen'] .word-box-outer{border:none!important;background:transparent!important;box-shadow:none!important;padding:60px 10vw!important;min-height:180px!important;}
[data-uilayout='zen'] .typing-area-wrap{min-height:82vh;display:flex!important;flex-direction:column!important;justify-content:center!important;}

[data-uilayout='cinema'] header{position:relative;z-index:60;padding:4px 0!important;border-bottom:none!important;opacity:.4;}
[data-uilayout='cinema'] header:hover{opacity:1;}
[data-uilayout='cinema'] .stats-row,[data-uilayout='cinema'] .panels,[data-uilayout='cinema'] .weak-strip,[data-uilayout='cinema'] .meta-bar,[data-uilayout='cinema'] .hint-bar{display:none!important;}
[data-uilayout='cinema'] .word-box-outer{border:none!important;background:transparent!important;box-shadow:none!important;padding:30px 6vw!important;}
[data-uilayout='cinema'] .typing-area-wrap{min-height:72vh;display:flex!important;flex-direction:column!important;justify-content:center!important;}

[data-uilayout='spotlight'] .panels,[data-uilayout='spotlight'] .weak-strip{display:none!important;}
[data-uilayout='spotlight'] .word-box-outer{padding:34px 6vw!important;min-height:180px!important;}

[data-uilayout='holo'] .word-box-outer{backdrop-filter:blur(18px) saturate(1.2)!important;}
[data-uilayout='holo'] .stats-row>div{backdrop-filter:blur(12px)!important;}


[data-uilayout='darkroom'] header{opacity:.7;}
[data-uilayout='darkroom'] .word-box-outer{letter-spacing:.02em;}

[data-uilayout='retro'] *:not(.scan-line){font-family:'JetBrains Mono',monospace!important;}
[data-uilayout='retro'] .word-box-outer{border-radius:4px!important;letter-spacing:.03em;}

[data-uilayout='neon'] .word-box-outer,[data-uilayout='neon'] .stats-row>div,[data-uilayout='neon'] .hint-bar,[data-uilayout='neon'] .panels{border-radius:0!important;}

[data-uilayout='brutalist'] *{font-family:'JetBrains Mono',monospace!important;border-radius:0!important;}
[data-uilayout='brutalist'] .word-box-outer{border-width:3px!important;}
[data-uilayout='brutalist'] .stats-row{gap:0!important;}
[data-uilayout='brutalist'] .stats-row>div{border-width:2px!important;margin:-1px 0 0 -1px!important;}


[data-uilayout='glassmorphic'] .word-box-outer{border-radius:18px!important;backdrop-filter:blur(20px) saturate(1.2)!important;}
[data-uilayout='glassmorphic'] .stats-row>div,[data-uilayout='glassmorphic'] .hint-bar,[data-uilayout='glassmorphic'] .panels{backdrop-filter:blur(16px)!important;}

[data-uilayout='ink'] *{font-family:Georgia,'Special Elite',serif!important;}
[data-uilayout='ink'] .word-box-outer{border-radius:3px!important;letter-spacing:.02em;}

// ── FX Engine ──
let _fxOriginEl=null;
function setFxOrigin(el){_fxOriginEl=el;}
function fireFX(mode,ac,originEl){
  const layer=document.getElementById('fx-layer');
  if(!layer||mode==='none')return;
  const r=originEl?originEl.getBoundingClientRect():null;
  const cx=r?r.left+r.width/2:window.innerWidth/2;
  const cy=r?r.top+r.height/2:window.innerHeight*0.35;
  const bw=r?r.width:300;
  const bh=r?r.height:80;
  function make(css){const d=document.createElement('div');Object.assign(d.style,{position:'fixed',...css});layer.appendChild(d);return d;}
  function purge(d,t){setTimeout(()=>d&&d.parentNode&&d.remove(),t);}
  // Word-level kill flash: brighten then shatter the source word element
  if(originEl&&r&&r.width>4){
    const _kf=make({left:(r.left-4)+'px',top:(r.top-4)+'px',width:(bw+8)+'px',height:(bh+8)+'px',
      background:`radial-gradient(ellipse at center,${ac}99 0%,${ac}33 50%,transparent 80%)`,
      borderRadius:'10px',mixBlendMode:'screen',
      animation:'lightningFlash .2s ease-out forwards'});
    purge(_kf,280);
    originEl.style.transition='filter .04s';
    originEl.style.filter='brightness(5) saturate(3) blur(1px)';
    setTimeout(()=>{if(originEl){originEl.style.filter='brightness(0) blur(4px)';setTimeout(()=>{if(originEl)originEl.style.filter='';},60);}},55);
  }

  if(mode==='slash'){
    // Realistic katana cut — diagonal slash tears through the word box
    const ang=-36;
    const len=bw*1.6+120;
    const styles={left:(cx-len/2)+'px',top:cy+'px',width:'0',height:'3px',borderRadius:'2px',
      background:`linear-gradient(90deg,transparent 0%,${ac}55 10%,#fff 40%,#fff 60%,${ac}55 90%,transparent 100%)`,
      boxShadow:`0 0 10px #fff,0 0 20px ${ac},0 0 40px ${ac}88`,
      transformOrigin:'left center',transform:`rotate(${ang}deg)`,
      animation:'slashLine .14s cubic-bezier(0.02,0.9,0.05,1) forwards'};
    // 3 slash lines of varying brightness
    [0,1,2].forEach((i,_,a)=>{
      const offset=[0,6,-5][i],opac=[1,0.55,0.35][i],h=[3,2,1.5][i];
      const s=make({...styles,top:(cy+offset)+'px',height:h+'px',opacity:opac.toString(),
        animationDelay:(i*0.025)+'s',animationDuration:(0.14+i*0.03)+'s'});
      purge(s,320+i*40);
    });
    // Box-level flash across the word area
    if(r){
      const flash=make({left:(r.left-2)+'px',top:(r.top-2)+'px',width:(r.width+4)+'px',height:(r.height+4)+'px',
        background:`linear-gradient(${ang}deg,transparent 25%,${ac}28 50%,transparent 75%)`,
        borderRadius:'10px',animation:'lightningFlash .16s ease-out forwards'});
      purge(flash,260);
    }
    // Scatter debris — small sharp shards flying from the cut
    const shardCols=['#ffffff','#ffffffcc',ac,ac+'cc'];
    for(let i=0;i<14;i++){
      const sideLeft=Math.random()>0.5;
      const baseAng=sideLeft?(Math.PI*(ang/180)+Math.random()*0.6):(Math.PI*(ang/180)+Math.PI-Math.random()*0.6);
      const dist=25+Math.random()*90;
      const sz=1.5+Math.random()*3.5;
      const p=make({
        left:(cx+(sideLeft?-bw*0.2:bw*0.2)*(Math.random()))+'px',top:(cy+Math.random()*bh*0.5-bh*0.25)+'px',
        width:sz+'px',height:(sz*0.5)+'px',borderRadius:'1px',
        background:shardCols[i%shardCols.length],
        transform:'translate(-50%,-50%) rotate('+Math.random()*180+'deg)',
        '--px':Math.cos(baseAng)*dist+'px','--py':Math.sin(baseAng)*dist+'px',
        animation:`particleBurst ${0.22+Math.random()*0.18}s ease-out forwards`
      });
      purge(p,480);
    }
    // Body shake
    document.body.style.animation='screenShake .18s ease-out';
    setTimeout(()=>{document.body.style.animation='';},220);
  }
  else if(mode==='explode'){
    const cols=[ac,'#ffffff','#ffee00','#ff00ff','#00ffff',ac+'bb','#ff8800'];
    for(let i=0;i<36;i++){
      const a=Math.random()*Math.PI*2,dist=55+Math.random()*160,sz=3+Math.random()*12;
      const p=make({left:cx+'px',top:cy+'px',width:sz+'px',height:sz+'px',
        borderRadius:Math.random()>0.3?'50%':'3px',background:cols[i%cols.length],
        boxShadow:`0 0 6px ${cols[i%cols.length]}`,transform:'translate(-50%,-50%)',
        '--px':Math.cos(a)*dist+'px','--py':Math.sin(a)*dist+'px',
        animation:`particleBurst ${0.45+Math.random()*0.4}s cubic-bezier(0,.9,.5,1) ${Math.random()*.06}s forwards`});
      purge(p,1000);
    }
    const ring=make({left:(cx-50)+'px',top:(cy-50)+'px',width:'100px',height:'100px',
      borderRadius:'50%',border:`3px solid ${ac}`,boxShadow:`0 0 20px ${ac},0 0 40px ${ac}66`,
      animation:'neonPulseRing .4s ease-out forwards'});
    purge(ring,500);
  }
  else if(mode==='ink'){
    for(let i=0;i<12;i++){

        animation:`lightningFlash .4s linear ${i*.04}s forwards`,opacity:(1-i*.25).toString()});
      purge(d,520);

  }
  else if(mode==='fire'){
    for(let i=0;i<20;i++){
      const fw=5+Math.random()*18,fh=22+Math.random()*60;

        width:fw+'px',height:fh+'px',

    for(let i=0;i<4;i++){

      purge(d,750);
    }
  }
  else if(mode==='glitch'){
    const cols=['#ff00ff','#00ffff','#ffff00','#ffffff'];
    for(let i=0;i<4;i++){
      const gw=bw*.9+40;

        boxShadow:`0 0 12px ${cols[i]}`,

      purge(d,460);
    }
  }
  else if(mode==='crystal'){
    const cols=[ac,'#aaeeff','#ffffff','#ccccff','#88ffee'];
    for(let i=0;i<24;i++){
      const a=Math.random()*Math.PI*2,dist=50+Math.random()*140,sz=5+Math.random()*20;
      const p=make({left:cx+'px',top:cy+'px',width:sz+'px',height:sz+'px',
        clipPath:'polygon(50% 0%,100% 50%,50% 100%,0% 50%)',background:cols[i%cols.length],
        boxShadow:`0 0 8px ${cols[i%cols.length]}`,transform:'translate(-50%,-50%)',
        '--px':Math.cos(a)*dist+'px','--py':Math.sin(a)*dist+'px',
        '--pr':(Math.random()*520-260)+'deg',
        animation:`crystalFly ${.45+Math.random()*.32}s cubic-bezier(0,.9,.5,1) forwards`});
      purge(p,900);

  }
  else if(mode==='confetti'){
    const cols=['#ff0','#f0f','#0ff','#0f0','#f60','#60f','#ff6b6b','#4bcffa','#fff','#ffd700'];

        '--px':Math.cos(a)*dist+'px','--py':(-40-Math.random()*190)+'px',

function KeyboardPanel({nextChar,spaceReady,ai,T}){
  const [hoveredKey,setHoveredKey]=useState(null);
  const fi=nextChar?FMAP[nextChar.toLowerCase()]:undefined;
  const fc=fi!==undefined?FCOLS[fi]:null;
  const keyW=34,keyH=34,keyGapX=4,keyGapY=6;
  const unitX=keyW+keyGapX;
  const rowOffsets=[0,0.5,1.0,1.5];
  const spaceOffset=2.9;
  const spaceUnits=5.2;

  const getHovStats=(k)=>{
    if(!k||!ai)return null;
    const kl=k.toLowerCase();
    const d=ai.ch&&ai.ch[kl];
    if(!d||!d.a||d.a<2)return null;
    const errRate=Math.round((d.e/d.a)*100);
    const avgDelay=d.d&&d.d.length?Math.round(d.d.reduce((s,x)=>s+x,0)/d.d.length):null;
    return{errRate,avgDelay,attempts:d.a};
  };

  function renderKey(k,opts={}){
    const {w=1,fn=false,label,side=''}=opts;
    const kl=typeof k==='string'?k.toLowerCase():k;
    const kfi=!fn?FMAP[kl]:undefined;
    const isNext=!fn&&nextChar&&kl===nextChar.toLowerCase();
    const kc=kfi!==undefined?FCOLS[kfi]:'#555';
    const isHov=hoveredKey===(k+side);
    const hovStats=isHov?getHovStats(k):null;
    const width=Math.round(keyW*w+(keyGapX)*(w-1));
    return h('div',{key:k+side,
      onMouseEnter:()=>setHoveredKey(k+side),
      onMouseLeave:()=>setHoveredKey(null),
      style:{
        position:'relative',
        width,height:keyH,borderRadius:fn?4:6,
        display:'flex',alignItems:'center',justifyContent:'center',
        fontSize:fn?9:10,fontFamily:T.mo,fontWeight:700,
        background:isNext?kc+'44':fn?T.di+'cc':kfi!==undefined?`${kc}14`:T.di,
        border:`1.5px solid ${isNext?kc:fn?T.mu+'44':kfi!==undefined?kc+'44':'#333'}`,
        color:isNext?'#fff':fn?T.mu:kfi!==undefined?kc+'cc':'#555',
        transition:'all 0.07s',
        boxShadow:isNext?`0 0 12px ${kc},0 0 24px ${kc}77`:isHov&&!fn?`0 0 8px ${kc}88`:'none',
        transform:isNext?'scale(1.15)':isHov&&!fn?'scale(1.08)':'scale(1)',
        animation:isNext?'keyGlow 0.8s ease infinite':'none',
        '--fg-col':kc,
        textShadow:isNext?`0 0 8px #fff`:'none',
        cursor:'default',userSelect:'none',flexShrink:0,

      label||k.toUpperCase(),
      isHov&&hovStats&&h('div',{style:{

        minWidth:90,textAlign:'center',
      }},
        h('div',{style:{fontSize:14,fontWeight:900,color:kc,fontFamily:T.mo,lineHeight:1.1,marginBottom:3}},k.toUpperCase()),
        h('div',{style:{fontSize:9,color:hovStats.errRate>20?T.er:T.ok,fontWeight:700}},`${hovStats.errRate}% error`),
        hovStats.avgDelay&&h('div',{style:{fontSize:9,color:T.mu,marginTop:2}},`${hovStats.avgDelay}ms avg`),
        h('div',{style:{fontSize:8,color:T.di,marginTop:2}},`${hovStats.attempts} attempts`)
      )
    );
  }

  return h('div',{className:'keyboard-panel',style:{background:T.sur,border:`1px solid ${T.di}`,borderRadius:10,padding:'10px 14px',marginTop:6,userSelect:'none',overflow:'visible'}},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}},
      h('div',{style:{fontSize:9,color:T.mu,textTransform:'uppercase',letterSpacing:'.12em'}},'Keyboard'),
      fi!==undefined&&fc&&h('div',{style:{display:'flex',alignItems:'center',gap:6,padding:'2px 9px',borderRadius:14,background:`${fc}20`,border:`1px solid ${fc}44`}},
        h('div',{style:{width:8,height:8,borderRadius:'50%',background:fc,boxShadow:`0 0 6px ${fc}`}}),
        h('span',{style:{color:fc,fontWeight:700,fontSize:13,fontFamily:T.mo}},nextChar?.toUpperCase()||'')
      )
    ),
    h('div',{style:{display:'flex',flexDirection:'column',gap:keyGapY,alignItems:'flex-start',width:'fit-content',margin:'0 auto',overflow:'visible'}},
      // Row 0: 1–0 + - + ⌫
      h('div',{style:{display:'flex',gap:keyGapX}},
        [...KROWS[0].map(k=>renderKey(k)),
         renderKey('-'),renderKey('+'),
         renderKey('⌫',{w:1.9,fn:true,label:'⌫'})]
      ),
      // Row 1: qwerty + [ ]

            border:`1.5px solid ${spaceReady?T.ac:'#333'}`,
            boxShadow:spaceReady?`0 0 12px ${T.ac},0 0 24px ${T.ac}77`:'none',
            transform:spaceReady?'scale(1.06)':'scale(1)',
            animation:spaceReady?`keyGlow 0.8s ease infinite`:'none',
            '--fg-col':T.ac,textShadow:spaceReady?`0 0 8px #fff`:'none',
            transition:'all 0.07s',cursor:'default',flexShrink:0,
          }},'SPACE')
      )
    ),
    h('div',{style:{marginTop:5,display:'flex',gap:3,flexWrap:'wrap',justifyContent:'center'}},
      FCOLS.map((c,i)=>i!==4&&h('div',{key:i,style:{display:'flex',alignItems:'center',gap:3,fontSize:7,padding:'1px 5px',borderRadius:8,background:fi===i?`${c}20`:'transparent',border:`1px solid ${fi===i?c:'transparent'}`}},
        h('div',{style:{width:6,height:6,borderRadius:'50%',background:c}}),
        h('span',{style:{color:fi===i?c:T.mu,fontWeight:fi===i?700:400}},FSHORT[i])
      ))
    )
  );
}

// ── Word Health/Damage Display ──
function WordHP({dmg,T,big=false}){
  if(!dmg||dmg===0)return null;
  const hp=Math.max(0,5-dmg),pct=(hp/5)*100;
  const col=hp>=4?T.ok:hp>=3?T.ac:hp>=2?'#ff8800':T.er;
  const isCrit=hp<=1;
  const isLow=hp<=2;
  return h('div',{style:{position:'absolute',top:big?-16:-7,left:0,right:0,height:big?5:3,background:T.di+'66',borderRadius:2,overflow:'visible',zIndex:3}},
    h('div',{style:{height:'100%',width:`${pct}%`,background:isLow?`linear-gradient(90deg,${T.er},#ff6600)`:col,borderRadius:2,transition:'width .1s ease,background .15s',
      boxShadow:isCrit?`0 0 8px ${T.er},0 0 16px ${T.er}88,0 0 4px #ff8800`:isLow?`0 0 4px ${col}88`:'none',
      animation:isCrit?'wordCrit .7s ease infinite':'none'}}),
    big&&h('div',{style:{position:'absolute',right:0,top:-13,fontSize:8,fontFamily:'JetBrains Mono,monospace',color:isCrit?T.er:isLow?'#ff8800':T.mu,letterSpacing:'.05em',fontWeight:isCrit?700:400,textShadow:isCrit?`0 0 8px ${T.er}`:'none'}},
      isCrit?'⚠ CRITICAL':`${hp}/5 HP`)
  );
}
// ── Arena Mode — Hack & Slash ──
// Each word is an enemy that charges from a random edge. Type it to kill it.
function ArenaMode({words,wIdx,typed,cIdx,cStates,done,errFlash,streak,T,precisionLevel,wordDamage,killedAt,killedWords,HP,curDmg,dmgStyle,killStyle,isPrecision}){
  const [positions,setPositions]=useState({});
  const [shakeTarget,setShakeTarget]=useState(-1);
  const arenaRef=useRef(null);
  const isPrr=precisionLevel>=2;

  // Assign positions to new words as they appear
  useEffect(()=>{
    setPositions(prev=>{
      const next={...prev};
      words.forEach((w,i)=>{
        if(next[i]) return;
        // Pick a random spawn edge and position
        const edge=Math.floor(Math.random()*4);
        const pct=15+Math.random()*70;
        // edge: 0=top, 1=right, 2=bottom, 3=left
        let x,y,ex,ey;
        if(edge===0){x=pct;y=5;ex=pct;ey=-30;}
        else if(edge===1){x=85;y=pct;ex=115;ey=pct;}
        else if(edge===2){x=pct;y=85;ex=pct;ey=115;}
        else{x=10;y=pct;ex=-20;ey=pct;}
        next[i]={x,y,ex,ey,edge,hue:Math.floor(Math.random()*360),born:Date.now()};
      });
      return next;
    });
  },[words.length]);

  // Shake on error
  useEffect(()=>{
    if(errFlash){setShakeTarget(wIdx);setTimeout(()=>setShakeTarget(-1),300);}
  },[errFlash]);

  const ENEMY_TYPES=[
    {shape:'⬟',name:'Grunt',color:'#f87171'},
    {shape:'◆',name:'Elite',color:'#fb923c'},
    {shape:'▲',name:'Flyer',color:'#a78bfa'},
    {shape:'●',name:'Tank',color:'#60a5fa'},
    {shape:'⬡',name:'Mage',color:'#34d399'},
  ];

  return h('div',{ref:arenaRef,style:{
    position:'relative',width:'100%',height:340,
    background:`radial-gradient(ellipse at 50% 110%,${T.ac}08 0%,${T.bg} 65%)`,
    border:`1px solid ${T.di}`,borderRadius:14,overflow:'hidden',
    boxShadow:`inset 0 0 60px rgba(0,0,0,.5),0 0 0 1px ${T.di}`,
  }},
    // Arena floor grid
    h('div',{style:{position:'absolute',inset:0,opacity:.04,backgroundImage:`linear-gradient(${T.ac} 1px,transparent 1px),linear-gradient(90deg,${T.ac} 1px,transparent 1px)`,backgroundSize:'40px 40px',pointerEvents:'none'}}),
    // Corner danger indicators
    h('div',{key:'c0',style:{position:'absolute',top:0,left:0,width:24,height:24,opacity:.15,background:T.er,clipPath:'polygon(0 0,100% 0,0 100%)'}}),
    h('div',{key:'c1',style:{position:'absolute',top:0,right:0,width:24,height:24,opacity:.15,background:T.er,clipPath:'polygon(0 0,100% 0,100% 100%)'}}),
    h('div',{key:'c2',style:{position:'absolute',bottom:0,left:0,width:24,height:24,opacity:.15,background:T.er,clipPath:'polygon(0 0,100% 100%,0 100%)'}}),
    h('div',{key:'c3',style:{position:'absolute',bottom:0,right:0,width:24,height:24,opacity:.15,background:T.er,clipPath:'polygon(100% 0,100% 100%,0 100%)'}}),
    // Crosshair / player indicator
    h('div',{style:{position:'absolute',left:'50%',top:'50%',transform:'translate(-50%,-50%)',zIndex:4,pointerEvents:'none'}},
      h('div',{style:{width:36,height:36,borderRadius:'50%',border:`1.5px solid ${T.ac}44`,boxShadow:`0 0 12px ${T.ac}22`,position:'relative',display:'flex',alignItems:'center',justifyContent:'center'}},
        h('div',{style:{width:6,height:6,borderRadius:'50%',background:T.ac,boxShadow:`0 0 8px ${T.ac}`}}),
        // Crosshair lines
        ...[0,90,180,270].map(r=>h('div',{key:r,style:{position:'absolute',width:8,height:1,background:`${T.ac}88`,transformOrigin:'left center',transform:`rotate(${r}deg) translateX(9px)`}}))
      )
    ),
    // Enemy words
    words.map((word,wi)=>{
      const pos=positions[wi];
      if(!pos) return null;
      const iD=wi<wIdx,iC=wi===wIdx,comp=done[wi];
      if(killedWords&&killedWords.has(wi)) return null;
      const isKilling=killedAt===wi;
      const type=ENEMY_TYPES[wi%ENEMY_TYPES.length];
      const dmg=(wordDamage&&wordDamage[wi])||0;
      const urgency=iC?1:Math.max(0,1-wi*0.15); // active enemy is most urgent

      // Position: enemies move toward center based on their spawn
      const progress=iC?0.75:iD?0:(wi-wIdx)*0.08; // closer = higher index approaching
      const cx=50,cy=50;
      const ex=pos.ex,ey=pos.ey;
      // Lerp from spawn to center
      const t=Math.min(0.85,0.2+(words.length-wi)*0.05+(iC?0.3:0));
      const lx=ex+(cx-ex)*t,ly=ey+(cy-ey)*t;

      const col=iD?(comp&&comp.ok?T.ok:T.er):iC?type.color:T.mu;
      const glowCol=iC?type.color:T.di;

      return h('div',{key:wi,style:{
        position:'absolute',
        left:`${lx}%`,top:`${ly}%`,
        transform:`translate(-50%,-50%) ${isKilling?'scale(0) rotate(180deg)':'scale(1)'}`,
        transition:isKilling?'transform .4s ease-in,opacity .4s':'none',
        opacity:isKilling?0:iD?0.3:1,
        zIndex:iC?10:5-Math.min(wi-wIdx,3),
        animation:!iD&&!isKilling?`enemyApproach .4s cubic-bezier(.34,1.4,.64,1) both`:'none',
        '--ex':`${(ex-lx)*10}px`,'--ey':`${(ey-ly)*10}px`,
        filter:shakeTarget===wi?`drop-shadow(0 0 12px ${T.er})`:`drop-shadow(0 0 ${iC?8:4}px ${glowCol}88)`,
      }},
        // Enemy body
        h('div',{style:{textAlign:'center',cursor:'default',userSelect:'none'}},
          // Damage HP bar
          iC&&h(HP,{dmg:curDmg,T,big:false}),
          // Enemy type icon
          h('div',{style:{
            fontSize:iC?28:18-Math.min(wi-wIdx,4)*2,
            color:col,lineHeight:1,marginBottom:2,
            animation:iC&&dmg>0?`dangerPulse .6s ease infinite`:'none',
            '--ec':type.color,
            textShadow:iC?`0 0 16px ${type.color},0 0 30px ${type.color}44`:'none',
          }},type.shape),
          // Word to type
          h('div',{style:{
            fontFamily:T.mo,
            fontSize:iC?16:Math.max(9,12-Math.min(wi-wIdx,2)*1.5),
            fontWeight:iC?700:400,
            letterSpacing:'.04em',
            background:iC?`${T.bg}cc`:'transparent',
            padding:iC?'2px 6px':'0',
            borderRadius:4,
            border:iC?`1px solid ${type.color}44`:'none',
            whiteSpace:'nowrap',
            animation:shakeTarget===wi?'screenShake .25s ease':'none',
          }},
            iC
              ?word.split('').map((ch,ci)=>{
                const st=isPrr?(cStates[ci]||'pending'):null;
                const isCC=isPrr?ci===cIdx:ci===typed.length;
                const tc=!isPrr?typed[ci]:null;
                const charCol=isPrr?(st==='ok'?T.ok:st==='wrong'?T.er:T.mu):(tc===undefined?T.mu:tc===ch?T.ok:T.er);
                return h('span',{key:ci,style:{position:'relative'}},
                  isCC&&h('span',{className:'cur',style:{background:errFlash?T.er:type.color,width:'2px',boxShadow:`0 0 6px ${type.color}`}}),
                  h('span',{style:{color:charCol,transition:'color .03s'}},ch)
                );
              })
              :h('span',{style:{color:iD?(comp&&comp.ok?T.ok:T.er):T.mu,opacity:iD?0.4:0.5}},word)
          ),
          // Approaching warning arrow for active enemy
          !iD&&iC&&h('div',{style:{
            position:'absolute',top:'100%',left:'50%',transform:'translateX(-50%)',
            fontSize:8,color:type.color,opacity:.6,marginTop:2,
            animation:'arenaWarn .8s ease infinite',
          }},'▼ TARGET')
        )
      );
    }),
    // Active word typed indicator at bottom
    h('div',{style:{
      position:'absolute',bottom:10,left:'50%',transform:'translateX(-50%)',
      fontFamily:T.mo,fontSize:11,color:typed?T.ac:T.di,
      background:`${T.bg}cc`,padding:'3px 10px',borderRadius:12,
      border:`1px solid ${typed?T.ac+'44':T.di+'33'}`,
      letterSpacing:'.08em',whiteSpace:'nowrap',
      transition:'border-color .1s,color .1s',
    }},typed||'type to fight · SPACE to strike'),
    // Streak counter
    streak>=3&&h('div',{style:{position:'absolute',top:10,right:12,fontSize:11,color:T.ac,fontFamily:T.mo,textShadow:`0 0 10px ${T.ac}`}},`🔥 ${streak} COMBO`),
    // Kill count
    h('div',{style:{position:'absolute',top:10,left:12,fontSize:9,color:T.mu,fontFamily:T.mo}},'⚔ '+wIdx+'/'+words.length)
  );
}

// ── Arcane Codex: Real-Time Hack & Slash Dungeon ──
// Enemies spawn from all sides carrying words above them.
// Type the active word to damage/kill the enemy. 
// BUT – each enemy also fires a projectile showing a dodge letter.
// Press that letter fast to dodge (character leaps away). Miss it → take damage.
// Boss every 5 kills. Fully animated, no pausing.
function ArcaneCodexMode({words,wIdx,typed,cIdx,cStates,done,errFlash,streak,T,precisionLevel,wordDamage,killedAt,killedWords,HP,curDmg,isPrecision}){
  const isPrr=precisionLevel>=2;

  // ── player state ──
  const [playerHP,setPlayerHP]=useState(100);
  const [dead,setDead]=useState(false);
  const [playerPos,setPlayerPos]=useState({x:180,y:165}); // position in arena
  const [playerFacing,setPlayerFacing]=useState(1); // 1=right, -1=left
  const [slashAnim,setSlashAnim]=useState(false);
  const [dodgeDir,setDodgeDir]=useState(null); // {dx,dy} for dodge leap
  const [invincible,setInvincible]=useState(false); // brief dodge i-frames
  const [hitFlash,setHitFlash]=useState(false);

  // ── enemy & projectile state ──
  const [kills,setKills]=useState(0);
  const [loot,setLoot]=useState([]);
  const [killFx,setKillFx]=useState([]); // [{id,x,y,col,boss,t}]
  const [projectiles,setProjectiles]=useState([]); // [{id,x,y,tx,ty,speed,col,letter,hit,dodged}]
  const projIdRef=useRef(0);
  const prevKilledRef=useRef(-2);
  const prevErrRef=useRef(false);
  const prevWIdxRef=useRef(-1);
  const animRef=useRef(null);
  const stateRef=useRef({playerHP:100,invincible:false,dead:false,playerPos:{x:180,y:165}});

  // ── dodge letter pool – every key on keyboard minus space ──
  const DODGE_LETTERS='QWERTYUIOPASDFGHJKLZXCVBNM'.split('');
  // Each enemy gets a unique dodge letter based on wIdx
  function getDodgeLetter(wi){ return DODGE_LETTERS[(wi*7+3)%DODGE_LETTERS.length]; }

  // ── Arena dimensions ──
  const AW=380,AH=260;
  const PX_BASE=190,PY_BASE=160;

  // ── Enemy definitions ──
  const ENEMY_DEFS=[
    {col:'#f87171',shape:'▼',name:'SHADE',   atk:'arrow',   projShape:'→'},
    {col:'#fb923c',shape:'◆',name:'BRUTE',   atk:'sword',   projShape:'⚔'},
    {col:'#fbbf24',shape:'●',name:'SPECTER', atk:'magic',   projShape:'✦'},
    {col:'#a78bfa',shape:'■',name:'REVENANT',atk:'void',    projShape:'◈'},
    {col:'#60a5fa',shape:'▲',name:'PHANTOM', atk:'ice',     projShape:'❄'},
    {col:'#f0abfc',shape:'◈',name:'WRAITH',  atk:'curse',   projShape:'☽'},
  ];
  const BOSS_DEF={col:'#ef4444',shape:'★',name:'BOSS',atk:'death',projShape:'💀'};
  const ITEMS=['⚔','🛡','💎','🔮','⚡','💫','🗡','🌟','📿','🏺'];

  // ── compute enemy positions (deterministic, up to 6 visible) ──
  function getEnemies(){
    const out=[];
    const SPREAD=[
      {ax:0.12,ay:0.18},{ax:0.88,ay:0.18},
      {ax:0.06,ay:0.62},{ax:0.94,ay:0.62},
      {ax:0.30,ay:0.08},{ax:0.70,ay:0.08},
    ];
    for(let i=0;i<6;i++){
      const wi=wIdx+i;
      if(wi>=words.length) break;
      if(killedWords&&killedWords.has(wi)&&killedAt!==wi) continue;
      const sp=SPREAD[i%(SPREAD.length)];
      const isBoss=wi>0&&wi%5===4;
      const def=isBoss?BOSS_DEF:ENEMY_DEFS[wi%ENEMY_DEFS.length];
      const x=Math.round(sp.ax*AW);
      const y=Math.round(sp.ay*AH*0.85+20);
      out.push({wi,word:words[wi]||'',isBoss,isActive:wi===wIdx,
        isKillingNow:killedAt===wi,def,x,y,i,
        dodgeLetter:getDodgeLetter(wi)});
    }
    return out;
  }

  const enemies=getEnemies();
  const activeEnemy=enemies.find(e=>e.isActive);
  const hpPct=playerHP/100;
  const hpCol=playerHP>60?'#4ade80':playerHP>30?'#fbbf24':'#ef4444';
  const enemyDmgPct=Math.max(0,1-curDmg/5);

  // ── Projectile spawning: when wIdx changes, active enemy fires ──
  useEffect(()=>{
    if(wIdx===prevWIdxRef.current) return;
    prevWIdxRef.current=wIdx;
    // Active enemy fires a projectile
    const en=getEnemies().find(e=>e.isActive);
    if(!en) return;
    const pid=projIdRef.current++;
    const pPos=stateRef.current.playerPos;
    // aim at player
    const dx=pPos.x-en.x, dy=pPos.y-en.y;
    const dist=Math.sqrt(dx*dx+dy*dy)||1;
    setProjectiles(ps=>[...ps.slice(-8),{
      id:pid,
      x:en.x,y:en.y,
      vx:(dx/dist)*2.2, vy:(dy/dist)*2.2,
      col:en.def.col,
      letter:en.dodgeLetter,
      shape:en.def.projShape,
      age:0, hit:false, dodged:false,
      fromBoss:en.isBoss,
    }]);
  },[wIdx]);

  // ── Extra projectile salvo from nearby enemies while typing ──
  useEffect(()=>{
    if(enemies.length<=1) return;
    // Every other nearby enemy also fires occasionally (on each word advance)
    const extras=enemies.filter(e=>!e.isActive&&e.i<=2);
    extras.forEach((en,idx)=>{
      setTimeout(()=>{
        const pid=projIdRef.current++;
        const pPos=stateRef.current.playerPos;
        const dx=pPos.x-en.x,dy=pPos.y-en.y;
        const dist=Math.sqrt(dx*dx+dy*dy)||1;
        setProjectiles(ps=>[...ps.slice(-8),{
          id:pid,x:en.x,y:en.y,
          vx:(dx/dist)*1.8,vy:(dy/dist)*1.8,
          col:en.def.col,letter:en.dodgeLetter,shape:en.def.projShape,
          age:0,hit:false,dodged:false,fromBoss:en.isBoss,
        }]);
      },(idx+1)*420);
    });
  },[wIdx]);

  // ── Projectile animation loop ──
  useEffect(()=>{
    let last=0;
    function tick(ts){
      if(!last){last=ts;}
      const dt=Math.min(ts-last,40);
      last=ts;
      const pPos=stateRef.current.playerPos;
      const inv=stateRef.current.invincible;
      const dead_=stateRef.current.dead;
      if(dead_){return;}
      setProjectiles(ps=>{
        const next=[];
        let tookHit=false;
        for(const p of ps){
          if(p.hit||p.dodged){
            const a=p.age+dt;
            if(a<600) next.push({...p,age:a});
            continue;
          }
          const nx=p.x+p.vx*dt*0.06;
          const ny=p.y+p.vy*dt*0.06;
          const px=pPos.x,py=pPos.y;
          const d=Math.sqrt((nx-px)**2+(ny-py)**2);
          // Hit player?
          if(d<18&&!inv){
            tookHit=true;
            next.push({...p,x:nx,y:ny,age:p.age+dt,hit:true});
          } else if(nx<-20||nx>AW+20||ny<-20||ny>AH+20){
            // off screen
          } else {
            next.push({...p,x:nx,y:ny,age:p.age+dt});
          }
        }
        if(tookHit&&!stateRef.current.invincible){
          stateRef.current.invincible=true;
          setInvincible(true);
          setHitFlash(true);
          setPlayerHP(hp=>{
            const dmg=p=>p.fromBoss?18:12;
            const allHits=ps.filter(p=>!p.hit&&!p.dodged&&
              Math.sqrt((p.x+p.vx*dt*0.06-pPos.x)**2+(p.y+p.vy*dt*0.06-pPos.y)**2)<18);
            const totalDmg=allHits.reduce((s,p)=>s+(p.fromBoss?18:12),12);
            const n=Math.max(0,hp-totalDmg);
            stateRef.current.playerHP=n;
            if(n<=0){stateRef.current.dead=true;setDead(true);}
            return n;
          });
          setTimeout(()=>{stateRef.current.invincible=false;setInvincible(false);setHitFlash(false);},800);
        }
        return next;
      });
      animRef.current=requestAnimationFrame(tick);
    }
    animRef.current=requestAnimationFrame(tick);
    return()=>{if(animRef.current)cancelAnimationFrame(animRef.current);};
  },[]);

  // ── Dodge key listener ──
  useEffect(()=>{
    function onKey(e){
      if(stateRef.current.dead) return;
      const k=e.key.toUpperCase();
      if(k===' '||e.key==='Enter') return; // handled by parent
      // Check if any live projectile has this dodge letter
      setProjectiles(ps=>{
        let dodged=false;
        const next=ps.map(p=>{
          if(!p.hit&&!p.dodged&&p.letter===k){dodged=true;return{...p,dodged:true,age:0};}
          return p;
        });
        if(dodged){
          // leap away from the projectile
          const proj=ps.find(p=>!p.hit&&!p.dodged&&p.letter===k);
          if(proj){
            const px=stateRef.current.playerPos.x;
            const py=stateRef.current.playerPos.y;
            const awayX=px+(px-proj.x)*0.18;
            const awayY=py+(py-proj.y)*0.18;
            const clampX=Math.max(24,Math.min(AW-24,awayX));
            const clampY=Math.max(28,Math.min(AH-24,awayY));
            stateRef.current.playerPos={x:clampX,y:clampY};
            setPlayerPos({x:clampX,y:clampY});
            setDodgeDir({dx:awayX-px,dy:awayY-py});
            setTimeout(()=>setDodgeDir(null),280);
          }
        }
        return next;
      });
    }
    window.addEventListener('keydown',onKey);
    return()=>window.removeEventListener('keydown',onKey);
  },[]);

  // ── Kill FX + loot + player slash animation ──
  useEffect(()=>{
    if(killedAt>=0&&killedAt!==prevKilledRef.current){
      prevKilledRef.current=killedAt;
      setKills(k=>k+1);
      setSlashAnim(true);
      setTimeout(()=>setSlashAnim(false),350);
      const isBoss=killedAt>0&&killedAt%5===4;
      if(isBoss){
        setLoot(l=>[...l.slice(-6),'👑']);
        setPlayerHP(hp=>{const n=Math.min(100,hp+25);stateRef.current.playerHP=n;return n;});
      } else if((killedAt*3+7)%10<4){
        setLoot(l=>[...l.slice(-6),ITEMS[killedAt%ITEMS.length]]);
      }
      const en=enemies.find(e=>e.wi===killedAt);
      if(en){
        const fxId=Date.now();
        setKillFx(fx=>[...fx.slice(-4),{id:fxId,x:en.x,y:en.y,col:en.def.col,boss:isBoss}]);
        setTimeout(()=>setKillFx(fx=>fx.filter(f=>f.id!==fxId)),700);
      }
    }
  },[killedAt]);

  // ── Damage from typos ──
  useEffect(()=>{
    if(errFlash&&!prevErrRef.current){
      setPlayerHP(hp=>{const n=Math.max(0,hp-7);stateRef.current.playerHP=n;if(n<=0){stateRef.current.dead=true;setDead(true);}return n;});
    }
    prevErrRef.current=errFlash;
  },[errFlash]);

  // Keep stateRef.playerPos in sync
  useEffect(()=>{stateRef.current.playerPos=playerPos;},[playerPos]);

  // ── Render helpers ──
  const plx=playerPos.x, ply=playerPos.y;
  const facing=activeEnemy?(activeEnemy.x>plx?1:-1):playerFacing;

  return h('div',{style:{position:'relative',width:'100%',userSelect:'none',borderRadius:14,overflow:'hidden',fontFamily:T.mo}},

    // ── DEATH SCREEN ──
    dead&&h('div',{style:{
      position:'absolute',inset:0,zIndex:50,borderRadius:14,
      background:'rgba(0,0,0,.96)',
      display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:10,
    }},
      h('div',{style:{fontSize:28,color:'#ef4444',letterSpacing:'.35em',textShadow:'0 0 30px #ef4444,0 0 60px #ef444455'}},'☠  SLAIN'),
      h('div',{style:{fontSize:10,color:'#64748b',letterSpacing:'.2em',marginTop:4}},`${kills} enemies killed`),
      loot.length>0&&h('div',{style:{display:'flex',gap:5,marginTop:6}},loot.map((l,i)=>h('span',{key:i,style:{fontSize:16}},l))),
      h('div',{style:{marginTop:14,fontSize:8,color:'#2d3748',letterSpacing:'.22em',border:'1px solid #2d3748',padding:'5px 14px',borderRadius:4}},
        'PRESS SPACE TO CONTINUE')
    ),

    // ── ARENA ──
    h('div',{style:{
      position:'relative',width:'100%',height:AH,overflow:'hidden',
      background:hitFlash
        ?'radial-gradient(ellipse at '+plx+'px '+ply+'px,#3f000a 0%,#0a0308 60%)'
        :'radial-gradient(ellipse at 50% 120%,#0f0a20 0%,#070410 80%)',
      transition:'background .15s',
    }},
      // ── Floor grid ──
      h('div',{style:{position:'absolute',inset:0,opacity:.028,
        backgroundImage:'repeating-linear-gradient(0deg,#c084fc,#c084fc 1px,transparent 1px,transparent 52px),repeating-linear-gradient(90deg,#c084fc,#c084fc 1px,transparent 1px,transparent 52px)',
        pointerEvents:'none'}}),
      // ── Vignette corners ──
      h('div',{style:{position:'absolute',inset:0,background:'radial-gradient(ellipse at 50% 50%,transparent 55%,#00000088 100%)',pointerEvents:'none'}}),
      // ── Arena border glow ──
      h('div',{style:{position:'absolute',inset:0,borderRadius:0,
        boxShadow:`inset 0 0 40px ${activeEnemy?activeEnemy.def.col+'18':'#c084fc14'}`,
        pointerEvents:'none',transition:'box-shadow .4s'}}),

      // ── KILL BURST FX ──
      ...killFx.map(fx=>h('div',{key:fx.id,style:{
        position:'absolute',left:fx.x,top:fx.y,
        width:fx.boss?100:60,height:fx.boss?100:60,
        borderRadius:'50%',
        background:`radial-gradient(circle,${fx.col}66,${fx.col}22 40%,transparent 70%)`,
        transform:'translate(-50%,-50%)',
        animation:'spellBurst .6s ease-out forwards',
        pointerEvents:'none',zIndex:14,
      }})),

      // ── PROJECTILES ──
      ...projectiles.map(p=>{
        if(p.hit&&p.age>300) return null;
        if(p.dodged&&p.age>300) return null;
        const opacity=p.hit||p.dodged?Math.max(0,1-p.age/300):1;
        const hitScale=p.hit?1+p.age/120:1;
        const dodgeScale=p.dodged?Math.max(0,1-p.age/200):1;
        return h('div',{key:p.id,style:{
          position:'absolute',left:p.x,top:p.y,
          transform:`translate(-50%,-50%) scale(${p.hit?hitScale:dodgeScale})`,
          opacity,
          zIndex:12,pointerEvents:'none',
          filter:p.hit?`brightness(4) drop-shadow(0 0 8px ${p.col})`:
                 p.dodged?`brightness(6) saturate(0)`:'none',
          transition:'opacity .08s',
        }},
          // Projectile body
          h('div',{style:{
            position:'relative',
            display:'flex',flexDirection:'column',alignItems:'center',gap:2,
          }},
            // Projectile visual
            h('div',{style:{
              fontSize:p.fromBoss?18:14,
              color:p.hit?'#fff':p.dodged?'#ffffff88':p.col,
              textShadow:`0 0 ${p.fromBoss?12:8}px ${p.col}`,
              lineHeight:1,
            }},p.hit?'💥':p.dodged?'✦':p.shape),
            // Dodge key hint — shown prominently on projectile
            !p.hit&&!p.dodged&&h('div',{style:{
              background:`${p.col}ee`,
              color:'#000',
              fontSize:9,fontWeight:900,
              padding:'1px 5px',borderRadius:3,
              fontFamily:T.mo,letterSpacing:'.1em',
              boxShadow:`0 0 8px ${p.col},0 0 16px ${p.col}66`,
              border:`1px solid ${p.col}`,
              minWidth:16,textAlign:'center',
            }},p.letter)
          )
        );
      }),

      // ── ENEMIES ──
      ...enemies.map(en=>{
        if(killedWords&&killedWords.has(en.wi)&&killedAt!==en.wi) return null;
        const isKilling=en.wi===killedAt;
        const isActive=en.wi===wIdx;
        const alpha=isKilling?0:Math.max(.12,1-en.i*.14);
        const scale=isKilling?0.05:(isActive?1.05:Math.max(.45,1-en.i*.13));
        const sz=isActive?(en.isBoss?46:36):Math.max(16,26-en.i*4);
        const typedLen=isPrr
          ?en.word.split('').filter((_,ci)=>(cStates[ci]||'pending')==='ok').length
          :isActive?typed.length:0;
        const wordPct=en.word.length>0?typedLen/en.word.length:0;
        // Direction toward player
        const toPlx=plx-en.x, toPlY=ply-en.y;
        const distToP=Math.sqrt(toPlx**2+toPlY**2)||1;
        // Slight lean toward player
        const leanDeg=Math.atan2(toPlY,toPlx)*180/Math.PI*0.08;

        return h('div',{key:en.wi,style:{
          position:'absolute',left:en.x,top:en.y,
          transform:`translate(-50%,-50%) scale(${scale}) rotate(${leanDeg}deg)`,
          opacity:alpha,
          transition:isKilling?'transform .28s ease-in,opacity .28s':'transform .25s,opacity .25s',
          zIndex:isActive?9:Math.max(2,8-en.i),
          pointerEvents:'none',
        }},
          h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',gap:2,position:'relative'}},
            // Boss crown
            en.isBoss&&isActive&&h('div',{style:{position:'absolute',top:-18,left:'50%',transform:'translateX(-50%)',fontSize:11,filter:'drop-shadow(0 0 8px #fbbf24)'}},'👑'),
            // Word label above enemy (only active, shows typing progress)
            isActive&&h('div',{style:{
              display:'flex',gap:1,marginBottom:3,
              transform:`scale(${1/scale})`, // counteract enemy scale to keep word readable
            }},
              en.word.split('').map((ch,ci)=>{
                const st=isPrr?(cStates[ci]||'pending'):null;
                const done_=isPrr?st==='ok':(typed[ci]!==undefined&&typed[ci]===ch);
                const wrong_=isPrr?st==='wrong':(typed[ci]!==undefined&&typed[ci]!==ch);
                const isCC=isPrr?ci===cIdx:ci===typed.length;
                return h('span',{key:ci,style:{
                  fontFamily:T.mo,fontSize:11,fontWeight:700,
                  color:done_?en.def.col:wrong_?T.er:isCC?'#fff':`${en.def.col}66`,
                  textShadow:done_?`0 0 6px ${en.def.col}`:isCC?'0 0 8px #fff':'none',
                  transition:'color .04s',letterSpacing:'.04em',
                  textDecoration:done_?'line-through':'none',
                }},ch.toUpperCase());
              })
            ),
            // Enemy body
            h('div',{style:{
              width:sz,height:sz,
              borderRadius:en.isBoss?'30%':'50%',
              background:`radial-gradient(circle at 40% 35%,${en.def.col}44,${en.def.col}11)`,
              border:`${isActive?2.5:1.5}px solid ${en.def.col}${isActive?'dd':'77'}`,
              boxShadow:isActive
                ?`0 0 ${en.isBoss?22:14}px ${en.def.col},0 0 ${en.isBoss?44:26}px ${en.def.col}44`
                :`0 0 6px ${en.def.col}22`,
              display:'flex',alignItems:'center',justifyContent:'center',
              fontSize:isActive?(en.isBoss?24:18):Math.max(8,sz*.55),
              color:en.def.col,
              animation:isActive?`heroAura ${en.isBoss?.55:.85}s ease infinite`:'none',
              '--ac':en.def.col,
              transition:'all .15s',
            }},en.def.shape),
            // Active enemy HP bar
            isActive&&h('div',{style:{width:Math.max(sz,32),height:3,background:'#160616',borderRadius:2,overflow:'hidden',marginTop:2}},
              h('div',{style:{height:'100%',width:`${enemyDmgPct*100}%`,
                background:`linear-gradient(90deg,${en.def.col}88,${en.def.col})`,
                borderRadius:2,transition:'width .1s',boxShadow:`0 0 4px ${en.def.col}`}})),
            // Dodge letter badge floating on non-active enemies
            !isActive&&en.i<=3&&h('div',{style:{
              position:'absolute',top:-10,right:-10,
              background:`${en.def.col}dd`,color:'#000',
              fontSize:7,fontWeight:900,padding:'1px 4px',
              borderRadius:2,fontFamily:T.mo,
              boxShadow:`0 0 6px ${en.def.col}`,
              opacity:.65,
            }},en.dodgeLetter)
          )
        );
      }),

      // ── TARGET LINE (player → active enemy) ──
      activeEnemy&&!dead&&h('svg',{style:{position:'absolute',inset:0,width:AW,height:AH,pointerEvents:'none',zIndex:3,overflow:'visible'}},
        h('line',{

const WDEFS=[
  {id:'xpbar',   label:'XP Bar',        icon:'⭐', defW:920, defH:40},
  {id:'metabar', label:'Meta Bar',       icon:'◆',  defW:920, defH:44},

  {id:'weakstrip',label:'Weak Keys',     icon:'⚠',  defW:920, defH:40},
  {id:'progress',label:'Progress Bar',   icon:'▬',  defW:920, defH:18},
  {id:'wordbox', label:'Word Box',       icon:'🔤', defW:920, defH:220},
  {id:'hintbar', label:'Hint Bar',       icon:'💬', defW:920, defH:52},
  {id:'footer',  label:'Footer',         icon:'▄',  defW:920, defH:36},
];
function mkWPos(){
  const W=920,x=20,g=8;let y=0;
  const seq=[
    {id:'xpbar',h:40},{id:'metabar',h:44},{id:'stats',h:92},
    {id:'panels',h:270},{id:'weakstrip',h:40},{id:'progress',h:18},
    {id:'wordbox',h:220},{id:'hintbar',h:52},{id:'footer',h:36},
  ];
  const out={};
  seq.forEach(({id,h})=>{out[id]={x,y,w:W,h,vis:true};y+=h+g;});
  return out;
}
function wposReducer(state,action){
  switch(action.t){
    case 'mv': return {...state,[action.id]:{...state[action.id],x:Math.max(0,action.x),y:Math.max(0,action.y)}};
    case 'rs': return {...state,[action.id]:{...state[action.id],w:Math.max(180,action.w),h:Math.max(32,action.h)}};
    case 'tog': return {...state,[action.id]:{...(state[action.id]||{vis:true}),vis:state[action.id]?.vis===false?true:false}};
    case 'reset': return mkWPos();
    case 'load': return {...mkWPos(),...action.data};
    default: return state;
  }
}
// DW = DraggableWidget. In normal mode: visibility-controlled wrapper. In edit mode: floating card with drag+resize.
function DW({id,wp,dis,edit,T,label,icon,defH,children}){
  const p=wp[id]||(()=>{const d=mkWPos();return d[id]||{x:20,y:0,w:920,h:defH||150,vis:true};})();
  const dragOff=useRef(null);
  const rsStart=useRef(null);

  function onDragDown(e){
    e.preventDefault();
    dragOff.current={ox:e.clientX-p.x,oy:e.clientY-p.y};
    function mm(ev){if(!dragOff.current)return;dis({t:'mv',id,x:ev.clientX-dragOff.current.ox,y:ev.clientY-dragOff.current.oy});}
    function mu(){dragOff.current=null;document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);}
    document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
  }
  function onResDown(e){
    e.preventDefault();e.stopPropagation();
    rsStart.current={sx:e.clientX,sy:e.clientY,sw:p.w,sh:p.h};
    function mm(ev){if(!rsStart.current)return;dis({t:'rs',id,w:rsStart.current.sw+ev.clientX-rsStart.current.sx,h:rsStart.current.sh+ev.clientY-rsStart.current.sy});}
    function mu(){rsStart.current=null;document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);}
    document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
  }

  // Normal mode: visibility wrapper
  if(!edit){
    if(wp[id]?.vis===false) return null;
    const nx=wp[id]?.x??0;
    return h('div',{style:{marginLeft:nx>30?nx-30+'px':'0px',transition:'margin-left .15s'}},children);
  }

  const vis=p.vis!==false;
  return h('div',{style:{
    position:'absolute',left:p.x,top:p.y,width:p.w,
    zIndex:vis?10:4,
    border:`2px solid ${vis?T.ac+'99':T.di+'66'}`,
    borderRadius:10,background:T.bg,
    boxShadow:vis?'0 6px 28px rgba(0,0,0,.55)':'0 2px 8px rgba(0,0,0,.3)',
    opacity:vis?1:0.45,transition:'opacity .2s,border-color .2s',
  }},
    h('div',{onMouseDown:onDragDown,style:{
      height:26,display:'flex',alignItems:'center',justifyContent:'space-between',
      padding:'0 10px',cursor:'grab',userSelect:'none',
      background:`${vis?T.ac:T.di}18`,borderBottom:`1px solid ${vis?T.ac:T.di}22`,
      borderRadius:'8px 8px 0 0',
    }},
      h('span',{style:{fontSize:9,color:vis?T.ac:T.mu,fontWeight:700,letterSpacing:'.12em',display:'flex',alignItems:'center',gap:5}},
        icon,' ',label.toUpperCase(),
        h('span',{style:{fontSize:8,color:T.di,fontWeight:400,marginLeft:4}}),`${p.w}×${p.h}px`
      ),
      h('div',{style:{display:'flex',alignItems:'center',gap:5}},
        h('span',{style:{fontSize:8,color:T.mu}}),`${p.w}×${p.h}`,
        h('button',{
          onClick:e=>{e.stopPropagation();dis({t:'tog',id});},
          style:{width:20,height:20,borderRadius:'50%',border:'none',cursor:'pointer',
            background:vis?T.ok+'30':T.er+'30',color:vis?T.ok:T.er,
            fontSize:12,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900}
        },vis?'●':'○')
      )
    ),
    h('div',{style:{height:p.h,overflow:'hidden',pointerEvents:'none',position:'relative'}},children),
    h('div',{onMouseDown:onResDown,style:{
      position:'absolute',bottom:0,right:0,width:22,height:22,cursor:'nwse-resize',
      background:`${T.ac}33`,borderRadius:'8px 0 8px 0',
      display:'flex',alignItems:'center',justifyContent:'center',
      fontSize:11,color:T.ac,userSelect:'none',zIndex:20,
    }},'⤡')
  );
}

    document.body.style.fontFamily=T.fo||"'Rajdhani',sans-serif";
  },[T]);

  useEffect(()=>{persist({});},[wp]);
  // Auto-save on scalar settings changes (not objects to avoid reference equality issues)
  useEffect(()=>{persist({});},[themeKey,renderMode,fxMode,soundType,fingerGuide,punct,precisionLevel,showKeyboard,showHP]);

  function persist(ex={}){saveLS({themeKey,game,tier,tw:ex.tw??tw,score:ex.score??score,renderMode,fxMode,soundType,fingerGuide,punct,precisionLevel,showKeyboard,showHP,numMix,continuousMode,uiLayout,customWords,customThemes,wpos:wp,ai:ai.save(),...ex});}

  function saveCustomTheme(themeData){
    const key=themeData._key||('custom_'+Date.now());
    const {_key,...rest}=themeData;
    const newCustom={...customThemes,[key]:{...rest,custom:true}};
    setCustomThemes(newCustom);
    rebuildThemes(newCustom);
    setThemeKey(key);
    setShowCustomTheme(false);
    setEditingTheme(null);
    persist({customThemes:newCustom,themeKey:key});
  }
  function deleteCustomTheme(key){
    const nc={...customThemes};delete nc[key];
    setCustomThemes(nc);rebuildThemes(nc);
    if(themeKey===key)setThemeKey('midnight');
    persist({customThemes:nc,themeKey:themeKey===key?'midnight':themeKey});
  }

  function unlock(id){if(!ai.ach.has(id)){ai.ach.add(id);setAchQueue(q=>[...q,id]);}}

  function checkAchs(wpm,acc,streak,tw,rc,game,cons){
    // Speed — pure WPM milestones
    if(wpm>=60)unlock('w60');if(wpm>=80)unlock('w80');
    if(wpm>=100)unlock('w100');if(wpm>=120)unlock('w120');
    if(wpm>=150)unlock('w150');if(wpm>=180)unlock('w180');if(wpm>=200)unlock('w200');
    // Accuracy — demanding thresholds
    if(acc>=95)unlock('acc95');if(acc>=99)unlock('acc99');if(acc>=100)unlock('acc100');
    if(ai.acc95streak>=10)unlock('acc_10');
    if(ai.acc100streak>=3)unlock('acc100_3');
    if(wpm>=80&&acc>=98)unlock('speed_acc');
    // Streak
    if(streak>=20)unlock('s20');if(streak>=50)unlock('s50');
    if(streak>=100)unlock('s100');if(streak>=200)unlock('s200');
    // Endurance — heavy grind
    if(rc>=50)unlock('r50');if(rc>=200)unlock('r200');
    if(rc>=500)unlock('r500');if(rc>=1000)unlock('r1000');
    if(tw>=10000)unlock('w10k');if(tw>=100000)unlock('w100k');if(tw>=500000)unlock('w500k');
    if(ai.consecRounds>=20)unlock('marathon');
    // Skill — multi-feat
    if(ai.recBreaks>=5)unlock('rec3');
    if(cons!==null&&cons!==undefined&&cons>=95)unlock('rhy');
    if(ai.botWins>=5)unlock('bot3');
    if(ai.drillRounds>=50)unlock('drill50');
    if(ai.fgRounds>=50)unlock('fing50');
    if(ai.noErrStreak>=10)unlock('noerr10');
    // Level
    const lv=levelFromXp(ai.xp||0).level;
    if(lv>=10)unlock('lv10');if(lv>=25)unlock('lv25');
    if(lv>=50)unlock('lv50');if(lv>=100)unlock('lv100');if(lv>=200)unlock('lv200');
    // Collection
    if(ai.games.size>=Object.keys(GAMES).length)unlock('all_games');
    if(ai.usedThemes.size>=Object.keys(THEMES).length)unlock('all_th');
    if(ai.usedRM.size>=RENDER_MODES.length)unlock('all_rm');
    if(ai.usedFX.size>=FX_MODES.length)unlock('all_fx');
    // True Completionist — must have everything else first
    const others=ACHS.filter(a=>a.id!=='all_ach');
    if(others.every(a=>ai.ach.has(a.id)))unlock('all_ach');
  }

  function mkWords(t,g,p,cw_override,opts){
    const src=p||pool||FALLBACK;
    const cw=cw_override||customWords;
    const usePunct=(opts&&opts.punct!==undefined)?opts.punct:punct;
    const useNumMix=(opts&&opts.numMix!==undefined)?opts.numMix:numMix;
    if(g==='numbers')return Array.from({length:30},()=>String(Math.floor(Math.random()*9000)+1000));
    if(g==='letters'){
      // Generate 40 groups of 1–3 letters each (random single chars, pairs, triples)
      const alpha='abcdefghijklmnoprstw';
      const groups=[];
      for(let i=0;i<40;i++){
        const len=Math.random()<0.55?1:Math.random()<0.65?2:3;
        let s='';for(let j=0;j<len;j++)s+=alpha[Math.floor(Math.random()*alpha.length)];
        groups.push(s);
      }
      if(useNumMix){
        const nums=Array.from({length:Math.ceil(groups.length*0.25)},()=>String(Math.floor(Math.random()*90)+10));
        return [...groups.flatMap(g=>g.split('')),...nums].sort(()=>Math.random()-0.5).slice(0,40);
      }
      return groups.flatMap(g=>g.split(''));
    }
    if(g==='quote'){const q=QUOTES[qI%QUOTES.length];return q.split(' ');}
    if(g==='custom'){if(cw.length>=3)return cw.length>40?shuf([...cw]).slice(0,40):cw;return shuf(src).slice(0,30);}
    const n=g==='drill'?20:g==='time'?50:30;
    let ws=ai.pick(src,t,g,n);
    if(usePunct)ws=ws.map(w=>Math.random()<0.15?w+',':Math.random()<0.1?w+'.':w);
    // numMix: sprinkle ~20% digits into word pool
    if(useNumMix){
      const nums=Array.from({length:Math.ceil(ws.length*0.22)},()=>String(Math.floor(Math.random()*9000)+100));
      ws=[...ws,...nums].sort(()=>Math.random()-0.5).slice(0,n);
    }
    return ws;
  }

  function initRound(t,g,cw_override,opts){
    clearInterval(wpmTR.current);clearInterval(timeTR.current);clearInterval(botTR.current);clearTimeout(cdrRef.current);
    const p=pool||FALLBACK;

  const onKey=useCallback(e=>{
    const key=e.key;
    if(renderMode==='geodash') return; // Dash handles own keys in capture phase
    if(key==='Tab'){e.preventDefault();
      // Tab: restart current round
      if(!started||over){boxRef.current&&boxRef.current.focus();return;}
      initRound(tier,game);boxRef.current&&boxRef.current.focus();
      return;
    }
    if(key==='Escape'&&focusMode){setFocusMode(false);return;}
    if(key==='Escape'&&!focusMode&&!started){return;}
    if(over||!words.length)return;
    if(!started){stRef.current=Date.now();setStarted(true);}
    const ik=lastKey.current?Date.now()-lastKey.current:0;lastKey.current=Date.now();
    const cw=words[wIdx]||'';

    if(key==='Backspace'){
      if(game==='time'||game==='zen'||precisionLevel>=2)return;
      if(typed.length>0){setTyped(t=>t.slice(0,-1));}
      return;
    }

    if(key===' '||key==='Enter'){
      e.preventDefault();
      if(!typed.trim())return;
      const attempt=typed.trim();
      const ok=attempt===cw;
      for(let i=0;i<Math.max(attempt.length,cw.length);i++){const ex=cw[i]||'',gt=attempt[i]||'';if(ex)ai.key(ex,gt,i===0?ik:0);}
      if(ik>0)delays.current.push(ik);
      rawCh.current+=attempt.length+1;
      if(soundType!=='off')beep(!ok,soundType);
      if(!ok)flare();
      if(ok){fireWordKill(wIdx);if(fxMode!=='none'){const _wel=boxRef.current?.querySelector(`[data-w="${wIdx}"]`);fireFX(fxMode,T.ac,_wel||boxRef.current);}}
      const nd=[...done,{w:cw,ok}];doneRef.current=nd;setDone(nd);
      if(ok){const ns=strRef.current+1;strRef.current=ns;if(ns>mxStrRef.current)mxStrRef.current=ns;setStreak(ns);}else{strRef.current=0;setStreak(0);}
      const nx=wIdx+1;
      if(game!=='time'&&nx>=words.length){
        if(continuousMode){
          // Sliding window refill handled by useEffect below — just advance index
          setWIdx(nx);setTyped('');return;
        } else {
          endRound(nd,stRef.current,delays.current);setTyped('');return;
        }
      }
      if(game==='time'&&nx>=words.length-4)setWords(p=>[...p,...ai.pick(pool||FALLBACK,tier,'time',15)]);
      setWIdx(nx);setTyped('');
      return;
    }

    if(precisionLevel>=2){
      // Hard (2) + Iron (3): char-by-char, wrong key blocked, no backspace
      const exp=cw[cIdx];
      if(key===exp){
        if(soundType!=='off')beep(false,soundType);
        rawCh.current++;
        ai.key(exp,key,ik);
        if(ik>0)delays.current.push(ik);
        if(cIdx<cw.length-1){setCStates(s=>{const n=[...s];n[cIdx]='ok';return n;});setCIdx(i=>i+1);}
        else{setCStates([]);setCIdx(0);const nd=[...done,{w:cw,ok:true}];doneRef.current=nd;setDone(nd);const ns=strRef.current+1;strRef.current=ns;if(ns>mxStrRef.current)mxStrRef.current=ns;setStreak(ns);if(fxMode!=='none'){const _pwel=boxRef.current?.querySelector(`[data-w="${wIdx}"]`);fireFX(fxMode,T.ac,_pwel||boxRef.current);}fireWordKill(wIdx);const nx=wIdx+1;if(nx>=words.length){if(continuousMode){setWIdx(nx);return;}else{endRound(nd,stRef.current,delays.current);return;}}setWIdx(nx);}
      } else {
        if(soundType!=='off')beep(true,soundType);
        ai.key(exp,key,0);
        flare();fireHit(wIdx);
        if(precisionLevel===3){
          // Iron: reset to word start
          setCStates([]);setCIdx(0);
        } else {
          // Hard: cursor stays
          setCStates(s=>{const n=[...s];n[cIdx]='wrong';return n;});
          setTimeout(()=>setCStates(s=>{const n=[...s];n[cIdx]='pending';return n;}),150);
        }
      }
      return;
    }
    if(key.length===1){
      rawCh.current++;
      if(soundType!=='off')beep(false,soundType);
      const _cw2=words[wIdx]||'';

        if(precisionLevel===1){

          beep(true,soundType);
          flare();fireHit(wIdx);
          return;
        }
        fireHit(wIdx);
      }
      setTyped(t=>t+key);
    }
  },[over,words,wIdx,cIdx,cStates,done,typed,started,game,tier,pool,fxMode,T.ac,soundType,precisionLevel,focusMode,continuousMode]);
